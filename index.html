<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Builder — Importer un examen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fc; color: #1e293b;
      margin: 0; padding: 40px 24px 80px;
      font-size: 15px; line-height: 1.6;
    }
    .container { max-width: 820px; margin: 0 auto; }

    /* Lang toggle */
    .topbar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 28px; gap: 16px; }
    .lang-toggle {
      display: flex; border: 1.5px solid #e2e8f0; border-radius: 999px;
      overflow: hidden; font-size: 0.8rem; font-weight: 700;
    }
    .lang-btn {
      padding: 5px 14px; cursor: pointer; border: none;
      background: transparent; font-family: inherit;
      font-size: 0.8rem; font-weight: 700; color: #94a3b8;
      transition: all 0.15s;
    }
    .lang-btn.active { background: #0f172a; color: #fff; }
    .lang-btn:first-child { border-radius: 999px 0 0 999px; }
    .lang-btn:last-child { border-radius: 0 999px 999px 0; }

    /* Header */
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.75rem; font-weight: 800; color: #0f172a; margin: 0 0 6px 0; letter-spacing: -0.02em; }
    .page-header p { color: #64748b; margin: 0; font-size: 0.95rem; }

    /* Steps */
    .steps { display: flex; margin-bottom: 32px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
    .step { flex: 1; padding: 14px 12px; display: flex; align-items: center; gap: 8px; border-right: 1px solid #e2e8f0; font-size: 0.82rem; color: #94a3b8; font-weight: 500; }
    .step:last-child { border-right: none; }
    .step.active { color: #1e293b; }
    .step.done { color: #16a34a; }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: #f1f5f9; color: #94a3b8; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step.active .step-num { background: #0f172a; color: #fff; }
    .step.done .step-num { background: #16a34a; color: #fff; }

    /* Card */
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; margin-bottom: 20px; }
    .card h2 { font-size: 1rem; font-weight: 700; color: #0f172a; margin: 0 0 6px 0; }
    .card-sub { font-size: 0.85rem; color: #64748b; margin: 0 0 24px 0; }

    /* Two-column layout */
    .upload-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }

    /* Drop zone */
    .upload-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8f9fc; position: relative; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #2563eb; background: #eff6ff; }
    .upload-zone.has-file { border-color: #16a34a; background: #f0fdf4; border-style: solid; }
    .zone-icon { font-size: 32px; margin-bottom: 12px; display: block; }
    .zone-label { font-size: 0.9rem; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
    .zone-sub { font-size: 0.8rem; color: #64748b; margin-bottom: 18px; line-height: 1.5; }
    .zone-btn { display: inline-block; background: #0f172a; color: #fff; padding: 10px 22px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: background 0.2s; }
    .zone-btn:hover { background: #1e3a5f; }

    /* File pill */
    .file-pill { display: none; align-items: center; gap: 8px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 10px 14px; margin-top: 12px; }
    .file-pill.visible { display: flex; }
    .pill-name { font-size: 0.82rem; font-weight: 600; color: #0f172a; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pill-size { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
    .pill-remove { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; }
    .pill-remove:hover { color: #dc2626; }

    .instructions-col { display: flex; flex-direction: column; gap: 10px; }
    .doc-wrap { background: #d0d0d0; border-radius: 6px; padding: 10px 10px 8px; }
    .doc-wrap-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #5a5a5a; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
    .doc-page {
      background: #fff;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      padding: 16px 24px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 0.88rem;
      color: #111;
      display: flex;
      gap: 40px;
    }
    .doc-col { flex: 1; line-height: 1.75; }
    .doc-page .doc-q { font-weight: 700; display: block; margin-bottom: 2px; }
    .doc-page .doc-opt { display: block; padding-left: 14px; }
    .doc-page .doc-correct { font-weight: 700; }
    .doc-page .doc-star { color: #dc2626; font-weight: 900; }
    .doc-page .doc-written-label { display: inline-block; background: #ede9fe; color: #6d28d9; font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 4px; font-family: 'Inter', sans-serif; margin-left: 6px; vertical-align: middle; }
    .doc-footer { margin-top: 8px; font-size: 0.72rem; color: #5a5a5a; font-family: 'Inter', sans-serif; line-height: 1.5; text-align: center; }
    .legend { display: flex; gap: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: #475569; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.red { background: #dc2626; }
    .legend-dot.purple { background: #7c3aed; }

    /* Alert */
    .alert { display: none; padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; margin-top: 14px; margin-bottom: 14px; }
    .alert.visible { display: block; }
    .alert.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert.warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    /* Extract button */
    .extract-btn { width: 100%; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; padding: 15px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 20px; transition: all 0.2s; display: none; }
    .extract-btn.visible { display: block; }
    .extract-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
    .extract-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Progress */
    .progress-wrap { display: none; margin-top: 16px; }
    .progress-wrap.visible { display: block; }
    .progress-label { font-size: 0.85rem; color: #475569; font-weight: 500; margin-bottom: 8px; }
    .progress-bar-bg { background: #e2e8f0; border-radius: 999px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #1d4ed8); border-radius: 999px; transition: width 0.4s ease; width: 0%; }

    /* Results */
    .results-card { display: none; }
    .results-card.visible { display: block; }
    .success-msg { display: flex; align-items: center; gap: 12px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; padding: 14px 18px; font-size: 0.9rem; font-weight: 600; color: #166534; margin-bottom: 12px; }

    /* AI spinner */
    .ai-spinner { display: flex; align-items: center; gap: 14px; padding: 24px 0; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* AI stats */
    .ai-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: #f8f9fc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; }
    .stat-label { font-size: 0.72rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .stat-value.green { color: #16a34a; }
    .stat-value.purple { color: #7c3aed; }

    /* Question list */
    .q-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; max-height: 420px; overflow-y: auto; }
    .q-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; background: #fff; }
    .q-item.open-q { border-color: #c4b5fd; background: #faf5ff; }
    .q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .q-num { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
    .q-type-badge { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .q-type-badge.mcq { background: #dbeafe; color: #1d4ed8; }
    .q-type-badge.open { background: #ede9fe; color: #7c3aed; }
    .q-text { font-size: 0.88rem; font-weight: 600; color: #0f172a; margin-bottom: 8px; line-height: 1.4; }
    .q-options { display: flex; flex-direction: column; gap: 4px; }
    .q-option { font-size: 0.82rem; color: #475569; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 6px; }
    .q-option.correct { background: #dcfce7; color: #166534; font-weight: 700; }
    .q-option-letter { font-weight: 700; min-width: 18px; }
    .q-open-hint { font-size: 0.82rem; color: #7c3aed; font-style: italic; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat { background: #f8f9fc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; }
    .stat-label { font-size: 0.72rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 1.3rem; font-weight: 800; color: #0f172a; }
    .stat-value.green { color: #16a34a; }
    .stat-value.purple { color: #7c3aed; }

    .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 10px; }
    .text-preview { background: #f8f9fc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; font-size: 0.82rem; color: #374151; line-height: 1.7; max-height: 240px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; margin-bottom: 20px; }

    .next-btn { width: 100%; background: #0f172a; color: #fff; border: none; padding: 15px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .next-btn:hover { background: #1e3a5f; }

    /* ── Review interface ───────────────────────────────────────── */
    .exam-meta { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .meta-field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .meta-field-sm { flex: 0 0 160px; }
    .meta-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .meta-input { padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: inherit; color: #0f172a; outline: none; width: 100%; transition: border-color 0.2s; }
    .meta-input:focus { border-color: #2563eb; }
    .meta-duration { display: flex; align-items: center; gap: 8px; }
    .meta-unit { font-size: 0.85rem; color: #64748b; white-space: nowrap; }

    .review-stats { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; font-weight: 500; }
    .review-stats .rs-mcq { color: #16a34a; font-weight: 700; }
    .review-stats .rs-open { color: #7c3aed; font-weight: 700; }
    .review-stats .rs-total { color: #0f172a; font-weight: 700; }

    /* Question cards */
    #reviewList { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

    .rq-card { border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff; transition: border-color 0.2s; }
    .rq-card:hover { border-color: #cbd5e1; }
    .rq-card.open-type { border-color: #c4b5fd; }
    .rq-card.inferred { border-color: #fde68a; }

    .rq-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f8f9fc; border-bottom: 1px solid #e2e8f0; }
    .rq-card.open-type .rq-header { background: #faf5ff; border-color: #e9d5ff; }
    .rq-card.inferred .rq-header { background: #fffbeb; border-color: #fde68a; }

    .rq-num { font-size: 0.75rem; font-weight: 700; color: #94a3b8; min-width: 28px; }
    .rq-badge { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .rq-badge.mcq { background: #dbeafe; color: #1d4ed8; }
    .rq-badge.open { background: #ede9fe; color: #7c3aed; }
    .rq-inferred { font-size: 0.72rem; color: #d97706; font-weight: 600; }

    .rq-type-toggle { margin-left: 4px; font-size: 0.72rem; font-weight: 600; color: #64748b; background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 2px 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .rq-type-toggle:hover { background: #f1f5f9; color: #0f172a; }

    .rq-actions { margin-left: auto; display: flex; gap: 4px; }
    .rq-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 6px; color: #94a3b8; transition: all 0.15s; font-family: inherit; }
    .rq-btn:hover { background: #f1f5f9; color: #0f172a; }
    .rq-btn.delete:hover { background: #fee2e2; color: #dc2626; }

    .rq-body { padding: 14px; }

    .rq-q-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 0.88rem; font-family: inherit; color: #0f172a; resize: vertical; min-height: 60px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; line-height: 1.5; }
    .rq-q-input:focus { border-color: #2563eb; }

    /* MCQ options */
    .rq-options { display: flex; flex-direction: column; gap: 6px; }
    .rq-cb { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #cbd5e1; background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; overflow: visible; }
    .rq-cb-checked { background: #16a34a; border-color: #16a34a; }
    .rq-correct-badge { font-size: 11px; font-weight: 600; color: #166534; white-space: nowrap; padding: 3px 10px; border-radius: 4px; background: #dcfce7; margin-left: auto; flex-shrink: 0; display: inline-flex; align-items: center; }
    .rq-option-row { display: flex; align-items: center; gap: 8px; }
    .rq-opt-letter { font-size: 0.78rem; font-weight: 800; color: #94a3b8; min-width: 20px; text-align: center; }
    .rq-opt-input { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 0.84rem; font-family: inherit; color: #0f172a; outline: none; transition: border-color 0.2s; min-width: 0; }
    .rq-opt-input:focus { border-color: #2563eb; }
    .rq-correct-check { font-size: 0.85rem; font-weight: 800; color: #16a34a; padding: 0 8px; flex-shrink: 0; }
    .rq-option-row { cursor: pointer; border-radius: 6px; transition: background 0.15s; }
    .rq-option-row:hover:not(.correct-row) { background: #f0fdf4; }
    .rq-option-row.correct-row { background: #f0fdf4; border: 1px solid #86efac !important; border-radius: 8px; padding: 6px 10px; }
    .rq-option-row.correct-row .rq-opt-input { border-color: transparent; background: #f0fdf4; color: #166534; }
    .rq-option-row.correct-row .rq-opt-letter { color: #16a34a; }

    /* Open question */
    .rq-open-note { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #ede9fe; border-radius: 8px; font-size: 0.82rem; color: #7c3aed; font-weight: 600; }

    /* Drag instructions */
    .drag-instructions { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #94a3b8; font-weight: 500; margin-bottom: 10px; padding: 8px 12px; background: #f8f9fc; border-radius: 8px; border: 1px dashed #e2e8f0; }

    /* Drag over — perforated top border shows where card will land */
    .rq-card.drag-over { border-color: #2563eb; box-shadow: 0 -3px 0 0 #2563eb; }
    .rq-card.drag-over::before { content: ''; display: block; height: 3px; background: repeating-linear-gradient(90deg, #2563eb 0px, #2563eb 8px, transparent 8px, transparent 14px); border-radius: 999px; margin: -1px -1px 0; }

    /* Media attached banner */
    .media-attached-banner { display: none; align-items: center; justify-content: space-between; gap: 10px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 8px 14px; margin-bottom: 12px; font-size: 0.82rem; font-weight: 600; color: #166534; flex-wrap: wrap; }
    .drag-handle { cursor: grab; padding: 4px; color: #94a3b8; display: flex; align-items: center; }
    .drag-handle:active { cursor: grabbing; }
    .rq-card.dragging { opacity: 0.4; }
    .rq-card.drag-over { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }

    /* Editing highlight */
    .rq-card.editing { border-color: #2563eb; box-shadow: 0 0 0 3px #dbeafe; }
    .rq-card.editing .rq-header { background: #eff6ff; border-bottom-color: #bfdbfe; }

    /* Delete button style */
    .rq-btn.delete { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; font-weight: 600; color: #94a3b8; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 10px; }
    .rq-btn.delete:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

    /* Undo toast */
    .undo-toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 12px 20px; border-radius: 10px; display: none; align-items: center; gap: 16px; font-size: 0.88rem; font-weight: 500; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .undo-toast.visible { display: flex; }
    .undo-toast button { background: #2563eb; border: none; color: #fff; padding: 5px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .undo-toast button:hover { background: #1d4ed8; }
    /* Exam lang toggle */
    .meta-extra { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .meta-extra-field { flex: 1; min-width: 220px; }
    .exam-lang-toggle { display: flex; gap: 6px; margin-top: 4px; }
    .exam-lang-btn { padding: 7px 16px; border-radius: 999px; border: 2px solid #e2e8f0; background: #f8f9fc; color: #475569; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .exam-lang-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .meta-hint { font-size: 0.72rem; color: #94a3b8; margin-top: 5px; line-height: 1.5; }

    /* No-star hint */
    .no-star-hint { font-size: 0.8rem; color: #64748b; background: #f8f9fc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 10px 14px; margin-top: 10px; line-height: 1.5; }

    /* Review instructions */
    .review-instructions-box { font-size: 0.82rem; color: #475569; background: #f8f9fc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; line-height: 1.7; }

    /* Collapsed card */
    .card.step-collapsed { padding: 14px 20px; cursor: pointer; }
    .card.step-collapsed > *:not(.step-done-bar) { display: none !important; }
    .step-done-bar { display: none; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; color: #16a34a; }
    .card.step-collapsed .step-done-bar { display: flex; }
    .card.step-collapsed:hover { border-color: #2563eb; }

    .rq-media-toggle { display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-top: 1px solid #e2e8f0; cursor: pointer; font-size: 0.8rem; font-weight: 600; color: #64748b; background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; text-align: left; font-family: inherit; transition: color 0.15s; }
    .rq-media-toggle:hover { color: #2563eb; }
    .rq-media-toggle.has-media { color: #2563eb; border-top-color: #bfdbfe; background: #f0f9ff; }

    .rq-media-panel { display: none; padding: 14px; border-top: 1px solid #e2e8f0; background: #f8f9fc; }
    .rq-media-panel.open { display: block; }

    .media-type-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .media-tab { padding: 5px 12px; border-radius: 6px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 0.78rem; font-weight: 700; color: #64748b; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .media-tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }

    .media-upload-area { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .media-upload-area:hover { border-color: #2563eb; background: #eff6ff; }
    .media-upload-area.has-file { border-color: #16a34a; background: #f0fdf4; border-style: solid; }
    .media-upload-label { font-size: 0.8rem; color: #64748b; font-weight: 500; }
    .media-upload-label strong { color: #0f172a; }

    .media-url-input { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.84rem; font-family: inherit; color: #0f172a; outline: none; transition: border-color 0.2s; }
    .media-url-input:focus { border-color: #2563eb; }

    .media-preview { margin-top: 12px; border-radius: 8px; overflow: hidden; }
    .media-preview img { max-width: 100%; max-height: 200px; border-radius: 8px; display: block; }
    .media-preview audio { width: 100%; }
    .media-preview iframe { width: 100%; height: 200px; border: none; border-radius: 8px; }
    .media-preview-label { font-size: 0.72rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

    .media-remove { margin-top: 8px; font-size: 0.78rem; color: #dc2626; background: none; border: none; cursor: pointer; font-family: inherit; font-weight: 600; padding: 0; }
    .media-remove:hover { text-decoration: underline; }
    .add-q-btn { width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 10px; background: transparent; color: #64748b; font-size: 0.88rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .add-q-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    .publish-btn { width: 100%; background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .publish-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,163,74,0.3); }
  </style>
</head>
<body>
<div class="container">

  <!-- Language toggle -->
  <div class="topbar">
    <div id="langToggleMount"></div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1"><div class="step-num">1</div><span data-i18n="step1"></span></div>
    <div class="step" id="step2"><div class="step-num">2</div><span data-i18n="step2"></span></div>
    <div class="step" id="step3"><div class="step-num">3</div><span data-i18n="step3"></span></div>
    <div class="step" id="step4"><div class="step-num">4</div><span data-i18n="step4"></span></div>
  </div>

  <!-- Upload card -->
  <div class="card" id="uploadCard">
    <div class="step-done-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
      <span id="uploadDoneLabel"></span>
    </div>

    <!-- 1. Title -->
    <h2 data-i18n="cardTitle" style="margin:0 0 12px 0;"></h2>

    <!-- 2. Instructions + hint -->
    <p class="card-sub" data-i18n="cardSub" style="margin-bottom:8px;"></p>
    <div class="no-star-hint" data-i18n="noStarHint" style="margin-bottom:20px;"></div>

    <!-- 3. Format example -->
    <div class="doc-wrap" style="margin-bottom:20px;">
      <div class="doc-wrap-label" data-i18n="docLabel"></div>
      <div class="doc-page">
        <div class="doc-col">
          <span class="doc-q" id="exQ1"></span>
          <span class="doc-opt" id="exA"></span>
          <span class="doc-opt doc-correct"><span class="doc-star">*</span><span id="exB"></span></span>
          <span class="doc-opt" id="exC"></span>
          <span class="doc-opt" id="exD"></span>
        </div>
        <div class="doc-col">
          <span class="doc-q">
            <span id="exQ2"></span>
            <span class="doc-written-label" data-i18n="autoDetect"></span>
          </span>
          <span class="doc-opt" id="exWritten" style="color:#475569; font-style:italic;"></span>
        </div>
      </div>
    </div>

    <!-- 4. Upload zone -->
    <div class="upload-zone" id="examZone">
      <span class="zone-icon" id="zoneIcon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
      <div class="zone-label" data-i18n="zoneLabel"></div>
      <div class="zone-sub" data-i18n="zoneSub"></div>
      <button class="zone-btn" data-i18n="zoneBtn" onclick="document.getElementById('examInput').click()"></button>
      <input type="file" id="examInput" accept=".docx,.pdf" style="display:none">
    </div>
    <div class="file-pill" id="filePill">
      <span id="pillIcon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
      <span class="pill-name" id="pillName">—</span>
      <span class="pill-size" id="pillSize">—</span>
      <button class="pill-remove" id="fileRemove">✕</button>
    </div>

    <div class="alert" id="alertBox"></div>
    <button class="extract-btn" id="extractBtn" data-i18n="extractBtn"></button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Results card — Step 1 success -->
  <div class="card results-card" id="resultsCard">
    <h2 data-i18n="resultsTitle"></h2>

    <div class="success-msg" id="successMsg"></div>
    <div class="alert" id="alertNoStar"></div>

    <button class="next-btn" id="nextBtn" data-i18n="nextBtn"></button>
  </div>

  <!-- AI extraction card — Step 2 -->
  <div class="card results-card" id="aiCard">
    <div class="step-done-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
      <span id="aiDoneLabel"></span>
    </div>
    <h2 data-i18n="aiTitle"></h2>
    <p class="card-sub" data-i18n="aiSub"></p>

    <!-- AI progress -->
    <div id="aiProgress">
      <div class="ai-spinner">
        <div class="spinner"></div>
        <span id="aiProgressLabel" data-i18n="aiProcessing"></span>
      </div>
    </div>

    <!-- AI results -->
    <div id="aiResults" style="display:none;">
      <div id="aiSuccessBanner" class="success-msg" style="display:none;margin-bottom:16px;"></div>
      <div class="ai-stats-row">
        <div class="stat"><div class="stat-label" data-i18n="aiMCQLabel"></div><div class="stat-value green" id="aiMCQCount">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="aiOpenLabel"></div><div class="stat-value purple" id="aiOpenCount">—</div></div>
        <div class="stat"><div class="stat-label" data-i18n="aiTotalLabel"></div><div class="stat-value" id="aiTotalCount">—</div></div>
      </div>

      <div class="alert" id="aiAlert" style="margin-top:16px;"></div>
    </div>
  </div>

  <!-- Review card — Step 3 -->
  <div class="card results-card" id="reviewCard">
    <h2 data-i18n="reviewTitle"></h2>
    <p class="card-sub" data-i18n="reviewSub"></p>
    <div class="review-instructions-box" data-i18n-html="reviewInstructions"></div>

    <!-- Exam metadata -->
    <div class="exam-meta">
      <div class="meta-field">
        <label class="meta-label" data-i18n="metaTitleLabel"></label>
        <input type="text" id="examTitle" class="meta-input" data-i18n-placeholder="metaTitlePlaceholder">
        <div id="examTitleError" style="display:none;font-size:0.75rem;color:#dc2626;margin-top:4px;font-weight:600;" data-i18n="metaTitleRequired"></div>
      </div>
      <div class="meta-field meta-field-sm">
        <label class="meta-label" data-i18n="metaDurationLabel"></label>
        <div class="meta-duration">
          <input type="number" id="examDuration" class="meta-input" value="20" min="5" max="180">
          <span class="meta-unit" data-i18n="metaDurationUnit"></span>
        </div>
      </div>
    </div>

    <!-- Review stats -->
    <div class="review-stats">
      <span id="reviewTotalStat"></span>
    </div>

    <!-- Drag instructions -->

    <!-- Language of student instructions + Groups -->
    <div class="meta-extra">
      <div class="meta-extra-field">
        <label class="meta-label" data-i18n="metaLangLabel"></label>
        <div class="exam-lang-toggle">
          <button class="exam-lang-btn active" id="examLangFR" onclick="setExamLang('fr')">Français</button>
          <button class="exam-lang-btn" id="examLangEN" onclick="setExamLang('en')">English</button>
        </div>
        <div class="meta-hint" data-i18n="metaLangHint"></div>
      </div>
      <div class="meta-extra-field">
        <label class="meta-label" data-i18n="metaGroupsLabel"></label>
        <input type="text" id="examGroups" class="meta-input" data-i18n-placeholder="metaGroupsPlaceholder">
        <div class="meta-hint" data-i18n="metaGroupsHint"></div>
      </div>
    </div>

    <div class="drag-instructions" id="dragInstructions">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect x="2" y="2" width="10" height="2" rx="1" fill="#94a3b8"/>
        <rect x="2" y="6" width="10" height="2" rx="1" fill="#94a3b8"/>
        <rect x="2" y="10" width="10" height="2" rx="1" fill="#94a3b8"/>
      </svg>
      <span data-i18n="dragInstructions"></span>
    </div>

    <!-- Editable question list -->
    <div id="reviewList"></div>

    <!-- Add question -->
    <button class="add-q-btn" id="addQuestionBtn" data-i18n="addQuestion"></button>

    <!-- Teacher email (captured before publish so results go to the right inbox) -->
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:0.82rem;font-weight:600;color:#475569;margin-bottom:6px;" data-i18n="teacherEmailPreLabel"></label>
      <input type="email" id="teacherEmailPre" data-i18n-placeholder="publishEmailPlaceholder"
        style="width:100%;padding:10px 13px;border:2px solid #e2e8f0;border-radius:10px;font-size:0.88rem;font-family:inherit;color:#0f172a;background:#fff;box-sizing:border-box;">
    </div>

    <!-- Publish -->
    <button class="publish-btn" id="publishBtn" data-i18n="publishBtn"></button>

    <!-- Publish result — shown after successful publish -->
    <div id="publishResult" style="display:none; margin-top:20px; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden; box-shadow:0 4px 20px rgba(15,23,42,0.08);">

      <!-- Green header -->
      <div style="background:linear-gradient(135deg,#16a34a,#15803d); padding:20px 24px;">
        <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:4px;" data-i18n="publishedLabel"></div>
        <div style="font-size:1.05rem;font-weight:700;color:#fff;">✅ <span data-i18n="publishedTitle"></span></div>
      </div>

      <div style="padding:22px 24px; background:#fff;">

        <!-- Exam info pill -->
        <div style="display:flex;align-items:center;gap:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;margin-bottom:20px;">
          <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
          <div>
            <div id="publishedExamTitle" style="font-size:0.9rem;font-weight:700;color:#0f172a;"></div>
            <div id="publishedExamMeta" style="font-size:0.75rem;color:#64748b;margin-top:2px;"></div>
          </div>
        </div>

        <!-- Link field -->
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:6px;" data-i18n="publishedLinkLabel"></div>
        <div style="display:flex;gap:8px;margin-bottom:18px;">
          <input id="shareUrlDisplay" type="text" readonly
            onclick="this.select()"
            style="flex:1;padding:10px 13px;border:2px solid #e2e8f0;border-radius:10px;font-size:0.8rem;font-family:monospace;color:#0f172a;background:#f8f9fc;cursor:text;min-width:0;">
          <button id="copyLinkBtn"
            onclick="copyShareLink()"
            style="display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:0 3px 10px rgba(37,99,235,0.25);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span data-i18n="copyLinkBtn"></span>
          </button>
        </div>

        <!-- Access code(s) -->
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:8px;" data-i18n="publishedCodeLabel"></div>
        <div id="codesDisplay" style="margin-bottom:20px;"></div>

        <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 18px;">

        <!-- Teacher email section -->
        <div style="font-size:0.82rem;font-weight:600;color:#475569;margin-bottom:6px;" data-i18n="publishEmailLabel"></div>
        <div style="display:flex;gap:8px;margin-bottom:6px;">
          <input type="email" id="teacherEmailInput" data-i18n-placeholder="publishEmailPlaceholder"
            style="flex:1;padding:10px 13px;border:2px solid #e2e8f0;border-radius:10px;font-size:0.88rem;font-family:inherit;color:#0f172a;background:#fff;">
          <button id="sendEmailBtn" onclick="sendTeacherEmail()"
            style="display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:2px solid #e2e8f0;background:#f1f5f9;color:#2563eb;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s;"
            onmouseover="this.style.background='#eff6ff';this.style.borderColor='#93c5fd'"
            onmouseout="this.style.background='#f1f5f9';this.style.borderColor='#e2e8f0'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span data-i18n="publishEmailBtn"></span>
          </button>
        </div>
        <div style="font-size:0.73rem;color:#94a3b8;line-height:1.5;" data-i18n="publishEmailHint"></div>
      </div>
    </div>
  </div>

</div>

      resultsSub:         "",
      successMsg:         "Document uploaded successfully",
      nextBtn:            "Send to AI for question extraction →",
      aiTitle:            "Step 2 — AI Extraction",
      aiSub:              "The AI analyses your document and structures the questions automatically.",
      aiProcessing:       "Analysing document — this may take 15 to 30 seconds…",
      aiMCQLabel:         "MCQ Questions",
      aiOpenLabel:        "Written Questions",
      aiTotalLabel:       "Total",
      aiPreviewLabel:     "Extracted questions",
      reviewBtn:          "Review and edit questions →",
      reviewTitle:        "Step 3 — Review and edit",
      reviewSub:          "Correct any questions, adjust answers, then publish.",
      reviewInstructions: "<strong>You can:</strong><ul style='margin:6px 0 0 0;padding-left:18px;line-height:2;'><li>Edit question text directly in the text field</li><li>Click an option to mark it as the correct answer</li><li>Drag a question up or down to reorder it</li><li>Delete a question with the Delete button (an Undo link appears immediately if you make a mistake)</li><li>Attach media (image, audio, video or PDF) using the button at the bottom of each question</li></ul>",
      metaTitleLabel:     "Exam title",
      metaTitlePlaceholder:"e.g. Parcoursup Entrance Exam 2026",
      metaDurationLabel:  "Duration",
      dragInstructions:   "Drag questions using the ≡ icon on the left to reorder them.",
      metaDurationUnit:   "minutes",
      addQuestion:        "+ Add a question",
      publishBtn:         "Confirm and publish exam →",
      publishedLabel:     "Exam published successfully",
      publishedTitle:     "Share these details with your students",
      publishedLinkLabel: "Exam link",
      publishedCodeLabel: "Student access code",
      copyLinkBtn:        "Copy link",
      copyCodeBtn:        "Copy code",
      teacherEmailPreLabel: "Your email (to receive student submissions)",
      publishEmailLabel:  "Receive the link and instructions by email",
      publishEmailPlaceholder: "your.email@institution.fr",
      publishEmailBtn:    "Send",
      publishEmailHint:   "You will receive the link, the code, and a list of best practices to share with your students.",
      metaTitleRequired:  "Exam title is required before publishing.",
      metaLangLabel:      "Language of student instructions",
      metaLangHint:       "Sets the language of instructions, buttons and messages shown to students.",
      metaGroupsLabel:    "Groups (optional)",
      metaGroupsPlaceholder: "e.g. Group A, Group B — separated by commas",
      metaGroupsHint:     "Students will select their group when logging in.",
      toggleToOpen:       "→ Written",
      toggleToMCQ:        "→ MCQ",
      optCorrectBtn:      "✓ Correct",
      optCorrectSelected: "✓ Correct",
      openNoteLabel:      "Teacher graded — open response",
      reviewStatsText:    "{total} questions · {mcq} MCQ · {open} written",
      noStarHint:         "If your document has no * markers, the AI will infer the correct answers — verify them in the next step.",
      aiErrorNoKey:       "Please enter your Anthropic API key at the top of the page.",
      aiErrorFailed:      "Extraction failed. Check your API key and try again.",
      noStarWarning:      "No * markers detected — the AI will attempt to infer correct answers. Review carefully in the next step.",
      partialStarWarning: "Some answers are not marked. Please verify all answers in the next step."
    }
  };

  let lang = (localStorage.getItem('examBuilderLang') || 'fr');
  let examLang = 'fr'; // Language for student-facing exam UI
  let currentFile = null;
  let extractedText = '';

  // ── Language switch ───────────────────────────────────────────
  function setLang(l) {
    lang = l;
    const t = i18n[l];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });
    // Dynamic elements
    document.getElementById('exQ1').textContent    = t.exQ1;
    document.getElementById('exA').textContent     = t.exA;
    document.getElementById('exB').textContent     = ' ' + t.exB;
    document.getElementById('exC').textContent     = t.exC;
    document.getElementById('exD').textContent     = t.exD;
    document.getElementById('exQ2').textContent    = t.exQ2;
    document.getElementById('exWritten').textContent = t.exWritten;
  }

  // Init with stored or default language
  setLang(lang);

  // Init EmailJS
  if (window.emailjs) {
    try { emailjs.init({ publicKey: 'Bb0oPYBiZGQcyIz5r' }); } catch(e) {}
  }

  // Wire lang.js toggle — runs after lang.js loads
  function setLangAndRefresh(l) {
    setLang(l);
    if (document.getElementById('reviewCard')?.classList.contains('visible')) {
      buildReviewList();
      updateReviewStats();
    }
  }

  // Lang.js fires 'langchange' when the globe dropdown is used
  document.addEventListener('langchange', e => setLangAndRefresh(e.detail.lang));

  function setExamLang(l) {
    examLang = l;
    document.getElementById('examLangFR').classList.toggle('active', l === 'fr');
    document.getElementById('examLangEN').classList.toggle('active', l === 'en');
  }

  // ── File handling ─────────────────────────────────────────────
  const examZone = document.getElementById('examZone');
  const examInput = document.getElementById('examInput');

  examInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
  document.getElementById('fileRemove').addEventListener('click', resetState);

  examZone.addEventListener('dragover', e => { e.preventDefault(); examZone.classList.add('dragover'); });
  examZone.addEventListener('dragleave', () => examZone.classList.remove('dragover'));
  examZone.addEventListener('drop', e => {
    e.preventDefault(); examZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    const t = i18n[lang];
    if (!['docx','pdf'].includes(ext)) { showAlert(t.alertWrongType, 'error'); return; }
    if (file.size > 10 * 1024 * 1024) { showAlert(t.alertTooLarge, 'error'); return; }
    currentFile = file; hideAlert();
    const fileSvg = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    examZone.classList.add('has-file');
    document.getElementById('zoneIcon').innerHTML = fileSvg;
    document.getElementById('pillIcon').innerHTML = fileSvg;
    document.getElementById('pillName').textContent = file.name;
    document.getElementById('pillSize').textContent = formatBytes(file.size);
    document.getElementById('filePill').classList.add('visible');
    document.getElementById('extractBtn').classList.add('visible');
    document.getElementById('resultsCard').classList.remove('visible');
  }

  // ── Extract ───────────────────────────────────────────────────
  document.getElementById('extractBtn').addEventListener('click', async () => {
    if (!currentFile) return;
    const btn = document.getElementById('extractBtn');
    btn.disabled = true; hideAlert();
    const t = i18n[lang];
    try {
      showProgress(t.progressRead, 10);
      const ext = currentFile.name.split('.').pop().toLowerCase();
      extractedText = ext === 'docx' ? await extractWord() : await extractPDF(t);
      showProgress(t.progressDone, 100);
      setTimeout(() => {
        document.getElementById('progressWrap').classList.remove('visible');
        showResults(t);
        markDone(1); markActive(2);
      }, 400);
    } catch(err) {
      showAlert('Erreur : ' + err.message, 'error');
      btn.disabled = false;
      document.getElementById('progressWrap').classList.remove('visible');
    }
  });

  function extractWord() {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = async e => {
        try { resolve((await mammoth.extractRawText({ arrayBuffer: e.target.result })).value.trim()); }
        catch(err) { reject(err); }
      };
      r.onerror = () => reject(new Error('Cannot read file'));
      r.readAsArrayBuffer(currentFile);
    });
  }

  async function extractPDF(t) {
    const pdf = await pdfjsLib.getDocument({ data: await currentFile.arrayBuffer() }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      showProgress(`${t.progressPDF} ${i} ${t.progressOf} ${pdf.numPages}…`, 10 + Math.round((i/pdf.numPages)*80));
      const content = await (await pdf.getPage(i)).getTextContent();
      text += content.items.map(x => x.str).join(' ') + '\n\n';
    }
    return text.trim();
  }

  // ── Show results ──────────────────────────────────────────────
  function showResults(t) {
    const lines = extractedText.split('\n');
    const starCount = lines.filter(l => /^\s*\*[A-D]/.test(l) || /^\s*\*\s/.test(l)).length;
    const hasStars = starCount > 0;
    // Rough MCQ option count — groups of 4 A/B/C/D lines suggest questions
    const optionLines = lines.filter(l => /^\s*[A-Da-d][\.\)]\s/.test(l.trim())).length;
    const estQuestions = Math.round(optionLines / 4);
    const allMarked = hasStars && estQuestions > 0 && starCount >= estQuestions;

    document.getElementById('successMsg').innerHTML =
      `<span>✅</span> <span>${t.successMsg} — <em>${currentFile.name}</em></span>`;

    const warningEl = document.getElementById('alertNoStar');
    if (!hasStars) {
      warningEl.textContent = t.noStarWarning;
      warningEl.className = 'alert visible warning';
    } else if (!allMarked) {
      warningEl.textContent = t.partialStarWarning;
      warningEl.className = 'alert visible warning';
    } else {
      warningEl.className = 'alert';
    }

    document.getElementById('resultsCard').classList.add('visible');
    document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Supabase Edge Function ────────────────────────────────────
  const EDGE_FUNCTION = 'https://toxgihdyfzdymgidgvaq.supabase.co/functions/v1/extract-questions';

  // ── Send to AI ────────────────────────────────────────────────
  document.getElementById('nextBtn').addEventListener('click', async () => {
    const t = i18n[lang];

    // Fix 2: Hide Step 1 entirely, show only Step 2
    document.getElementById('uploadCard').style.display = 'none';
    document.getElementById('resultsCard').style.display = 'none';

    const aiCard = document.getElementById('aiCard');
    aiCard.classList.add('visible');
    document.getElementById('aiProgress').style.display = 'block';
    document.getElementById('aiResults').style.display = 'none';
    document.getElementById('aiProgressLabel').textContent = t.aiProcessing;
    markDone(1); markActive(2);
    window.scrollTo({ top: 0, behavior: 'smooth' });

    try {
      const response = await fetch(EDGE_FUNCTION, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: extractedText }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error || `Server error ${response.status}`);
      }

      const data = await response.json();

      // Fix 1 — validate API response before using it
      console.log('AI response:', data);
      if (!data || !Array.isArray(data.questions) || data.questions.length === 0) {
        throw new Error('Invalid API response: ' + JSON.stringify(data));
      }

      showAIResults(data.questions, t);
      markDone(2); markActive(3);

      // Collapse Steps 1 and 2
      document.getElementById('uploadCard').classList.add('step-collapsed');
      document.getElementById('resultsCard').classList.remove('visible');
      document.getElementById('aiCard').classList.add('step-collapsed');

      const mcqCount2  = data.questions.filter(q => q.type === 'mcq').length;
      const openCount2 = data.questions.filter(q => q.type === 'open').length;
      document.getElementById('aiDoneLabel').textContent = lang === 'fr'
        ? `Étape 2 — ${data.questions.length} questions extraites (${mcqCount2} QCM · ${openCount2} rédigées) ✓`
        : `Step 2 — ${data.questions.length} questions extracted (${mcqCount2} MCQ · ${openCount2} written) ✓`;
      document.getElementById('uploadDoneLabel').textContent = lang === 'fr'
        ? 'Étape 1 — Document importé ✓'
        : 'Step 1 — Document uploaded ✓';

      // Build review card
      document.getElementById('examTitle').setAttribute('placeholder', t.metaTitlePlaceholder);

      // Fix 2 — no return inside catch — Step 3 always shows
      try {
        buildReviewList();
        updateReviewStats();
      } catch(buildErr) {
        console.error('Review build error:', buildErr);
        // Don't return — still show Step 3
      }

      // Fix 3 — Step 3 ALWAYS becomes visible regardless of build errors
      markDone(3); markActive(4);
      const reviewCard = document.getElementById('reviewCard');
      reviewCard.classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch(err) {
      console.error('Fetch error:', err);
      document.getElementById('aiProgress').style.display = 'none';
      const alertEl = document.getElementById('aiAlert');
      alertEl.textContent = t.aiErrorFailed + ' (' + err.message + ')';
      alertEl.className = 'alert visible error';
      document.getElementById('aiResults').style.display = 'block';
    }
  });

  // ── Render AI results ─────────────────────────────────────────
  function showAIResults(questions, t) {
    document.getElementById('aiProgress').style.display = 'none';
    document.getElementById('aiResults').style.display = 'block';

    const mcq  = questions.filter(q => q.type === 'mcq').length;
    const open = questions.filter(q => q.type === 'open').length;
    document.getElementById('aiMCQCount').textContent   = mcq;
    document.getElementById('aiOpenCount').textContent  = open;
    document.getElementById('aiTotalCount').textContent = questions.length;

    // Show success banner
    const banner = document.getElementById('aiSuccessBanner');
    if (banner) {
      banner.textContent = lang === 'fr'
        ? `✅ Analysé avec succès — ${questions.length} questions extraites`
        : `✅ Analysed successfully — ${questions.length} questions extracted`;
      banner.style.display = 'flex';
    }

    // Store for review step
    window.extractedQuestions = questions;
  }

  // ── Review interface (Phase 2.5) ─────────────────────────────
  const LETTERS = ['A','B','C','D'];

  function buildReviewList() {
    const list = document.getElementById('reviewList');
    if (!Array.isArray(window.extractedQuestions) || window.extractedQuestions.length === 0) {
      console.error('extractedQuestions invalid:', window.extractedQuestions);
      return;
    }
    list.innerHTML = '';
    window.extractedQuestions.forEach((q, idx) => {
      list.appendChild(buildQuestionCard(q, idx));
    });
  }

  function buildQuestionCard(q, idx) {
    const t = i18n[lang];
    const isMCQ  = q.type === 'mcq';
    const isInferred = q.inferred;
    const div = document.createElement('div');
    div.className = `rq-card${isMCQ ? '' : ' open-type'}${isInferred ? ' inferred' : ''}`;
    div.dataset.idx = idx;

    // Drag to reorder
    div.draggable = true;
    div.addEventListener('dragstart', e => {
      window._dragIdx = idx;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      const from = window._dragIdx;
      const to   = idx;
      if (from === to) return;
      const qs = window.extractedQuestions;
      const item = qs.splice(from, 1)[0];
      qs.splice(to, 0, item);
      buildReviewList();
    });

    // Fix 1: Click anywhere on card to highlight it blue
    div.addEventListener('click', () => {
      document.querySelectorAll('.rq-card').forEach(c => c.classList.remove('editing'));
      div.classList.add('editing');
      window._activeCardIdx = idx;
    });
    div.addEventListener('focusin', () => {
      document.querySelectorAll('.rq-card').forEach(c => c.classList.remove('editing'));
      div.classList.add('editing');
      window._activeCardIdx = idx;
    });

    // Header
    const header = document.createElement('div');
    header.className = 'rq-header';
    header.innerHTML = `
      <span class="drag-handle" title="${lang === 'fr' ? 'Glisser pour réorganiser' : 'Drag to reorder'}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="10" height="2" rx="1" fill="#94a3b8"/>
          <rect x="2" y="6" width="10" height="2" rx="1" fill="#94a3b8"/>
          <rect x="2" y="10" width="10" height="2" rx="1" fill="#94a3b8"/>
        </svg>
      </span>
      <span class="rq-num">Q${idx + 1}</span>
      <span class="rq-badge ${isMCQ ? 'mcq' : 'open'}">${isMCQ ? 'QCM' : (lang === 'fr' ? 'Rédigée' : 'Written')}</span>
      ${isInferred ? `<span class="rq-inferred">${lang === 'fr' ? 'réponse inférée' : 'inferred answer'}</span>` : ''}
      <button class="rq-type-toggle" onclick="toggleType(${idx})">${isMCQ ? t.toggleToOpen : t.toggleToMCQ}</button>
      <div class="rq-actions">
        <button class="rq-btn delete" onclick="deleteQuestion(${idx})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
          </svg>
          ${lang === 'fr' ? 'Supprimer' : 'Delete'}
        </button>
      </div>`;
    div.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'rq-body';

    // Question text
    const qInput = document.createElement('textarea');
    qInput.className = 'rq-q-input';
    qInput.value = q.question;
    qInput.rows = 2;
    qInput.addEventListener('input', () => {
      window.extractedQuestions[idx].question = qInput.value;
    });
    body.appendChild(qInput);

    if (isMCQ) {
      const optsDiv = document.createElement('div');
      optsDiv.className = 'rq-options';
      (q.options || ['','','','']).forEach((opt, oi) => {
        const row = document.createElement('div');
        row.className = `rq-option-row${q.correct === oi ? ' correct-row' : ''}`;
        row.dataset.oi = oi;

        const letter = document.createElement('span');
        letter.className = 'rq-opt-letter';
        letter.textContent = LETTERS[oi] + '.';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'rq-opt-input';
        input.value = opt;
        input.addEventListener('input', () => {
          if (!window.extractedQuestions[idx].options) window.extractedQuestions[idx].options = ['','','',''];
          window.extractedQuestions[idx].options[oi] = input.value;
        });

        // Checkbox UI — green when correct, badge appears
        const cb = document.createElement('div');
        cb.className = 'rq-cb' + (q.correct === oi ? ' rq-cb-checked' : '');
        if (q.correct === oi) {
          cb.innerHTML = '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><polyline points="1,4 4,7 9,1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }

        row.appendChild(cb);
        row.appendChild(letter);
        row.appendChild(input);

        if (q.correct === oi) {
          const badge = document.createElement('span');
          badge.className = 'rq-correct-badge';
          badge.textContent = lang === 'fr' ? 'Bonne réponse' : 'Correct answer';
          row.appendChild(badge);
        }

        row.style.cursor = 'pointer';
        row.addEventListener('click', e => {
          if (e.target.tagName === 'INPUT') return;
          setCorrect(idx, oi);
        });
        optsDiv.appendChild(row);
      });
      body.appendChild(optsDiv);
    } else {
      const note = document.createElement('div');
      note.className = 'rq-open-note';
      note.innerHTML = `<span>✍</span> <span>${t.openNoteLabel}</span>`;
      body.appendChild(note);
    }

    div.appendChild(body);

    // Media toggle + panel
    const mediaToggle = document.createElement('button');
    mediaToggle.className = `rq-media-toggle${q.media ? ' has-media' : ''}`;
    mediaToggle.innerHTML = `📎 ${q.media ? (lang === 'fr' ? 'Média attaché — modifier' : 'Media attached — edit') : (lang === 'fr' ? 'Attacher un média (vidéo, image, audio, PDF)' : 'Attach media (video, image, audio, PDF)')}`;
    mediaToggle.addEventListener('click', () => {
      mediaPanel.classList.toggle('open');
    });

    const mediaPanel = document.createElement('div');
    mediaPanel.className = 'rq-media-panel';
    mediaPanel.appendChild(buildMediaPanel(q, idx));

    div.appendChild(mediaToggle);
    div.appendChild(mediaPanel);

    return div;
  }

  function setCorrect(qIdx, optIdx) {
    window.extractedQuestions[qIdx].correct = optIdx;
    window.extractedQuestions[qIdx].inferred = false;
    buildReviewList();
  }

  function toggleType(qIdx) {
    const q = window.extractedQuestions[qIdx];
    if (q.type === 'mcq') {
      // Save options before switching — restore if toggled back
      q._savedOptions = q.options;
      q._savedCorrect = q.correct;
      q.type = 'open';
      q.correct = null;
      q.options = [];
    } else {
      q.type = 'mcq';
      // Restore saved options if available
      q.options = q._savedOptions?.length ? q._savedOptions : ['','','',''];
      q.correct = q._savedCorrect ?? 0;
    }
    buildReviewList();
    updateReviewStats();
  }

  // ── Undo delete ───────────────────────────────────────────────
  window._deletedStack = [];

  function deleteQuestion(qIdx) {
    const deleted = { q: window.extractedQuestions[qIdx], idx: qIdx };
    window._deletedStack.push(deleted);
    window.extractedQuestions.splice(qIdx, 1);
    buildReviewList();
    updateReviewStats();
    showUndoToast();
  }

  function showUndoToast() {
    let toast = document.getElementById('undoToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'undoToast';
      toast.className = 'undo-toast';
      document.body.appendChild(toast);
    }
    const label = lang === 'fr' ? 'Question supprimée' : 'Question deleted';
    const undo  = lang === 'fr' ? 'Annuler' : 'Undo';
    toast.innerHTML = `<span>${label}</span><button onclick="undoDelete()">${undo}</button>`;
    toast.classList.add('visible');
    clearTimeout(window._undoTimer);
    window._undoTimer = setTimeout(() => {
      toast.classList.remove('visible');
      window._deletedStack = [];
    }, 5000);
  }

  function undoDelete() {
    if (!window._deletedStack.length) return;
    const { q, idx } = window._deletedStack.pop();
    window.extractedQuestions.splice(idx, 0, q);
    buildReviewList();
    updateReviewStats();
    const toast = document.getElementById('undoToast');
    if (toast) toast.classList.remove('visible');
  }

  document.getElementById('addQuestionBtn').addEventListener('click', () => {
    window.extractedQuestions.push({
      number: window.extractedQuestions.length + 1,
      question: '',
      type: 'mcq',
      options: ['','','',''],
      correct: 0,
      inferred: false
    });
    buildReviewList();
    updateReviewStats();
    document.getElementById('reviewList').lastElementChild
      ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  function buildMediaPanel(q, idx) {
    const wrapper = document.createElement('div');
    const mediaTypes = [
      { key:'video', labelFR:'Vidéo', labelEN:'Video' },
      { key:'image', labelFR:'Image', labelEN:'Image' },
      { key:'audio', labelFR:'Audio', labelEN:'Audio' },
      { key:'pdf',   labelFR:'PDF',   labelEN:'PDF'   },
    ];

    if (q.media?.src) {
      // File attached — show ONLY banner + remove. No tabs until deleted.
      const typeName = mediaTypes.find(m => m.key === q.media.type)?.[lang === 'fr' ? 'labelFR' : 'labelEN'] || '';
      const banner = document.createElement('div');
      banner.className = 'media-attached-banner';
      banner.style.display = 'flex';
      banner.innerHTML =
        '<span>&#x2705; ' + typeName + ' ' + (lang === 'fr' ? 'attach\u00e9' : 'attached') +
        ' — <em>' + (q.media.name || '') + '</em></span>' +
        '<button class="media-remove" onclick="removeMedia(' + idx + ')">&#x2715; ' +
        (lang === 'fr' ? 'Supprimer' : 'Remove') + '</button>';
      wrapper.appendChild(banner);
    } else {
      // No file — show type tabs + upload zone
      const currentType = q.media?.type || 'image';
      let activeType = currentType;

      const tabs = document.createElement('div');

      const inputArea = document.createElement('div');

      const renderZone = (type) => {
        inputArea.innerHTML = '';
        inputArea.appendChild(buildUploadZone(type, idx, wrapper));

      mediaTypes.forEach(mt => {
        const btn = document.createElement('button');
        btn.className = 'media-tab' + (activeType === mt.key ? ' active' : '');
        btn.textContent = lang === 'fr' ? mt.labelFR : mt.labelEN;
        btn.addEventListener('click', () => {
          tabs.querySelectorAll('.media-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeType = mt.key;
          renderZone(mt.key);

        tabs.appendChild(btn);

               : type === 'pdf'   ? 'PDF'
               : '';

      const urlInput = document.createElement('input');
      urlInput.type = 'text';
      urlInput.className = 'media-url-input';
      urlInput.placeholder = lang === 'fr' ? 'Lien YouTube ou Vimeo…' : 'YouTube or Vimeo URL…';
      urlInput.addEventListener('blur', () => {
        const url = urlInput.value.trim();
        if (!url) return;
        if (!window.extractedQuestions[idx].media) window.extractedQuestions[idx].media = {};
        window.extractedQuestions[idx].media.type = 'video';
        window.extractedQuestions[idx].media.src  = url;
        window.extractedQuestions[idx].media.name = url;
        updateMediaToggle(idx);
        const panel = panelWrapper.closest ? panelWrapper.closest('.rq-media-panel') : panelWrapper;
        if (panel) { panel.innerHTML = ''; panel.appendChild(buildMediaPanel(window.extractedQuestions[idx], idx)); }
      });
      frag.appendChild(urlInput);
    } else {
      const accept = type === 'image' ? 'image/*' : type === 'audio' ? 'audio/*' : 'application/pdf';
      const fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.accept = accept; fileInput.style.display = 'none';

      const uploadArea = document.createElement('div');
      uploadArea.className = 'media-upload-area';

      uploadArea.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          if (!window.extractedQuestions[idx].media) window.extractedQuestions[idx].media = {};
          window.extractedQuestions[idx].media.type = type;
          window.extractedQuestions[idx].media.src  = e.target.result;
          window.extractedQuestions[idx].media.name = file.name;
          updateMediaToggle(idx);
          const panel = panelWrapper.closest ? panelWrapper.closest('.rq-media-panel') : panelWrapper;
          if (panel) { panel.innerHTML = ''; panel.appendChild(buildMediaPanel(window.extractedQuestions[idx], idx)); }
        };
        reader.readAsDataURL(file);

      frag.appendChild(fileInput);

  function renderPreview(container, media) {
    container.innerHTML = '';

    const label = document.createElement('div');
    label.className = 'media-preview-label';
    label.textContent = lang === 'fr' ? 'Aperçu' : 'Preview';
    container.appendChild(label);

    if (media.type === 'image') {
      const img = document.createElement('img');
      img.src = media.src;
      container.appendChild(img);
    } else if (media.type === 'audio') {
      const audio = document.createElement('audio');
      audio.controls = true; audio.src = media.src;
      container.appendChild(audio);
    } else if (media.type === 'pdf') {
      const iframe = document.createElement('iframe');
      iframe.src = media.src;
      iframe.style.cssText = 'width:100%;height:200px;border:none;border-radius:8px;';
      container.appendChild(iframe);
    } else if (media.type === 'video') {
      const embedUrl = getEmbedUrl(media.src);
      if (embedUrl) {
        const iframe = document.createElement('iframe');
        iframe.src = embedUrl;
        iframe.style.cssText = 'width:100%;height:180px;border:none;border-radius:8px;';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        container.appendChild(iframe);
      }
    }
  }

  function getEmbedUrl(url) {
    if (!url) return null;
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
    const vm = url.match(/vimeo\.com\/(\d+)/);
    if (vm) return `https://player.vimeo.com/video/${vm[1]}`;
    return null;
  }

      alert(lang === 'fr' ? 'Aucune question à publier.' : 'No questions to publish.');
      return;
    }

    // Required: exam title
    const title = document.getElementById('examTitle').value.trim();
    const titleError = document.getElementById('examTitleError');
    if (!title) {
      titleError.style.display = 'block';
      document.getElementById('examTitle').focus();
      document.getElementById('examTitle').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (titleError) titleError.style.display = 'none';

    const duration = parseInt(document.getElementById('examDuration').value) || 20;
    const groups   = document.getElementById('examGroups').value.trim();

    const btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = lang === 'fr' ? 'Publication en cours…' : 'Publishing…';

    try {
      const shareId = generateShareId();

      // Generate one code per group, or one general code if no groups
      const groupList = groups ? groups.split(',').map(g => g.trim()).filter(Boolean) : [];
      let groupCodes = {};
      let accessCode;
      if (groupList.length > 0) {
        groupList.forEach(g => { groupCodes[g] = generateAccessCode(); });
        accessCode = Object.values(groupCodes)[0]; // fallback single code
      } else {
        accessCode = generateAccessCode();
      }
      const groupCodesJson = JSON.stringify(groupCodes);

      // 1. Create exam row
      const teacherEmail = document.getElementById('teacherEmailPre').value.trim() || currentUserEmail;
      const examRows = await sbPost('exams', {
        teacher_id:    currentUserId,
        teacher_email: teacherEmail || null,
        title:         title,
        duration_mins: duration,
        status:        'published',
        share_id:      shareId,
        access_code:   accessCode,
        lang:          examLang,
        groups:        groups,
        group_codes:   groupCodesJson
      });
      const examId = examRows[0].id;

      // 2. Create question rows
      for (let i = 0; i < qs.length; i++) {
        const q = qs[i];
        const opts = q.options || [];
        await sbPost('questions', {
          exam_id:       examId,
          position:      i + 1,
          question_text: q.question || q.question_text || '',
          type:          q.type || 'mcq',
          option_a:      opts[0] || null,
          option_b:      opts[1] || null,
          option_c:      opts[2] || null,
          option_d:      opts[3] || null,
          correct_index: q.type === 'mcq' ? (q.correct ?? 0) : null,
          correct_option: q.type === 'mcq' ? ['A','B','C','D'][q.correct ?? 0] : null,
          media_type:    q.media?.type || null,
          media_src:     q.media?.src  || null,
          media_name:    q.media?.name || null
        });
      }

      // 3. Build shareable URL
      const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === ''
        ? window.location.origin + '/exam-engine.html'
        : 'https://dwayneswanson-ecdp.github.io/exam-builder-admin/exam-engine.html';
      const shareUrl = baseUrl + '?id=' + shareId;

      // 4. Show success panel
      btn.disabled = false;
      btn.textContent = lang === 'fr' ? '\u2705 Publié !' : '\u2705 Published!';
      btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';

      // Populate panel info
      const titleEl = document.getElementById('publishedExamTitle');
      const metaEl  = document.getElementById('publishedExamMeta');
      const mcqC = qs.filter(q => q.type === 'mcq').length;
      const opnC = qs.filter(q => q.type === 'open').length;
      if (titleEl) titleEl.textContent = title;
      if (metaEl)  metaEl.textContent  = duration + ' min · ' + mcqC + ' QCM' + (opnC > 0 ? ' · ' + opnC + (lang === 'fr' ? ' rédigées' : ' written') : '');

      // Populate codes display
      const codesEl = document.getElementById('codesDisplay');
      if (codesEl) {
        if (groupList.length > 0) {
          // One code card per group
          codesEl.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:10px;">' +
            groupList.map(g => `
              <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 16px;text-align:center;min-width:120px;">
                <div style="font-size:0.7rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px;">${g}</div>
                <div style="font-size:1rem;font-weight:800;font-family:monospace;letter-spacing:0.12em;color:#0f172a;">${groupCodes[g]}</div>
              </div>`).join('') +
            '</div>';
        } else {
          // Single code
          codesEl.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <div id="accessCodeDisplay" style="font-size:1.15rem;font-weight:800;font-family:monospace;letter-spacing:0.15em;color:#0f172a;background:#f0fdf4;border:2px solid #86efac;padding:7px 20px;border-radius:999px;">${accessCode}</div>
            <button onclick="navigator.clipboard.writeText('${accessCode}').then(()=>{this.textContent='✓ Copié';setTimeout(()=>{this.textContent='${lang==='fr'?'Copier le code':'Copy code'}'},1500)})"
              style="padding:6px 14px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8f9fc;color:#475569;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:inherit;">
              ${lang === 'fr' ? 'Copier le code' : 'Copy code'}
            </button>
          </div>`;
        }
      }
      window._publishedGroupCodes = groupCodes;
      window._publishedAccessCode = accessCode;
      btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';

      const publishResult = document.getElementById('publishResult');
      if (publishResult) {
        publishResult.style.display = 'block';
        document.getElementById('shareUrlDisplay').value = shareUrl;
        document.getElementById('accessCodeDisplay').textContent = accessCode;
        if (teacherEmail) document.getElementById('teacherEmailInput').value = teacherEmail;
        publishResult.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

    } catch (err) {
      console.error('Publish error:', err);
      alert((lang === 'fr' ? 'Erreur lors de la publication : ' : 'Publish error: ') + err.message);
      btn.disabled = false;
      btn.textContent = lang === 'fr' ? 'Confirmer et publier l\'examen \u2192' : 'Confirm and publish exam \u2192';
      btn.style.background = '';
    }
  });


  // ── Reset ─────────────────────────────────────────────────────
  function resetState() {
    currentFile = null; extractedText = '';
    examInput.value = '';
    examZone.classList.remove('has-file');
    document.getElementById('zoneIcon').innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
    document.getElementById('filePill').classList.remove('visible');
    document.getElementById('extractBtn').classList.remove('visible');
    document.getElementById('extractBtn').disabled = false;
    document.getElementById('progressWrap').classList.remove('visible');
    document.getElementById('resultsCard').classList.remove('visible');
    hideAlert();
    markActive(1);
    document.getElementById('step2').classList.remove('done','active');
  }

  // ── Helpers ───────────────────────────────────────────────────
  function showProgress(label, pct) {
    document.getElementById('progressWrap').classList.add('visible');
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressFill').style.width = pct + '%';
  }
  function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.textContent = msg; el.className = `alert visible ${type}`;
  }
  function hideAlert() { document.getElementById('alertBox').className = 'alert'; }
  function formatBytes(b) {
    if (b<1024) return b+' B';
    if (b<1024*1024) return (b/1024).toFixed(1)+' KB';
    return (b/(1024*1024)).toFixed(1)+' MB';
  }
  function markDone(n) {
    const el = document.getElementById('step'+n);
    el.classList.remove('active'); el.classList.add('done');
    el.querySelector('.step-num').textContent = '✓';
  }
  function markActive(n) { document.getElementById('step'+n).classList.add('active'); }
</script>
<script src="lang.js"></script>
<script>
  // Init globe toggle after lang.js loads — passes existing i18n strings
  Lang.init(i18n);
</script>
