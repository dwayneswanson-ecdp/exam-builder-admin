<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Exam Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .brand-sub {
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 400;
    }

    /* Lang toggle — top right, globe+dropdown on light surface */
    .lang-top-right {
      position: fixed;
      top: 20px;
      right: 24px;
    }
    .lang-globe-light { position: relative; display: inline-flex; align-items: center; }
    .lang-globe-light-btn {
      display: flex; align-items: center; gap: 5px;
      background: transparent; border: none; cursor: pointer;
      color: #64748b; font-size: 0.72rem; font-weight: 700;
      font-family: inherit; padding: 5px 8px; border-radius: 6px;
      transition: color 0.15s; line-height: 1;
    }
    .lang-globe-light-btn:hover { color: #0f172a; }
    .lang-globe-light-btn .lang-caret { transition: transform 0.15s; }
    .lang-globe-light-btn.open .lang-caret { transform: rotate(180deg); }
    .lang-drop-light {
      position: absolute; right: 0; top: calc(100% + 6px);
      background: #fff; border: 1.5px solid #e2e8f0;
      border-radius: 9px; overflow: hidden; min-width: 130px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.1); z-index: 500;
    }
    .lang-drop-light button {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 10px 14px; background: transparent; border: none;
      color: #64748b; font-size: 0.82rem; font-weight: 500;
      font-family: inherit; cursor: pointer; text-align: left; transition: all 0.12s;
    }
    .lang-drop-light button:hover { background: #f8fafc; color: #0f172a; }
    .lang-drop-light button.lact { color: #0f172a; font-weight: 700; }
    .lang-drop-light .lcheck { font-size: 0.7rem; opacity: 0; }
    .lang-drop-light button.lact .lcheck { opacity: 1; }

    /* Subtitle — left-aligned, just above email */
    .login-subtitle {
      text-align: left;
      font-size: 0.82rem;
      color: #64748b;
      font-weight: 400;
      margin-bottom: 10px;
    }
    .login-subtitle strong {
      color: #0f172a;
      font-weight: 700;
    }

    /* Fields */
    .field {
      position: relative;
      margin-bottom: 14px;
    }
    .field input {
      width: 100%;
      height: 52px;
      padding: 16px 14px 0;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0f172a;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: #0f172a;
    }
    .field input.error-input {
      border-color: #dc2626;
    }
    .field label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #94a3b8;
      pointer-events: none;
      transition: all 0.15s;
      background: #fff;
      padding: 0 2px;
    }
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 10px;
      transform: none;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #64748b;
    }
    .field input:focus ~ label {
      color: #0f172a;
    }
    .field input.error-input ~ label {
      color: #dc2626;
    }

    /* Password toggle */
    .field .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .field .eye-btn:hover { color: #0f172a; }

    /* Error message */
    .field-error {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #dc2626;
      margin-top: 6px;
      margin-left: 2px;
    }
    .field-error svg { flex-shrink: 0; }

    /* Forgot password */
    .forgot {
      text-align: right;
      margin-bottom: 20px;
      margin-top: -4px;
    }
    .forgot a {
      font-size: 0.8rem;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot a:hover { color: #0f172a; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      height: 50px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }
    .btn-submit:hover { background: #1e293b; }
    .btn-submit:active { background: #0f172a; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider-line { flex: 1; height: 1px; background: #f1f5f9; }
    .divider-text { font-size: 0.75rem; color: #cbd5e1; font-weight: 500; }

    /* Sign up row */
    .signup-row {
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
    }
    .signup-row a {
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
    }
    .signup-row a:hover { text-decoration: underline; }

    /* State toggle for mockup */
    .mockup-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
    }
    .toggle-btn {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      color: #64748b;
    }
    .toggle-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
  </style>
</head>
<body>

  <div class="lang-top-right">
    <div class="lang-globe-light" id="loginLangGlobe">
      <button class="lang-globe-light-btn" id="loginLangBtn" onclick="toggleLoginLang()" aria-label="Language">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        <span id="loginLangLabel">FR</span>
        <svg class="lang-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="lang-drop-light" id="loginLangDrop" style="display:none;">
        <button id="optFR" class="lact" onclick="setLang('fr')">Français <span class="lcheck">✓</span></button>
        <button id="optEN" onclick="setLang('en')">English <span class="lcheck">✓</span></button>
      </div>
    </div>
  </div>

  <div class="login-wrap">

    <div class="brand">
      <div class="brand-name">Exam Builder</div>
    </div>

    <form onsubmit="return false;">

      <p class="login-subtitle" id="brandSub">Se connecter à <strong>Exam Builder</strong> pour continuer</p>

      <!-- Email -->
      <div class="field">
        <input type="email" id="email" placeholder=" " autocomplete="email">
        <label for="email">Adresse e-mail</label>
      </div>

      <!-- Password — default state (no error) -->
      <div class="field" id="passwordField">
        <input type="password" id="password" placeholder=" " autocomplete="current-password" style="padding-right:42px;">
        <label for="password">Password</label>
        <button type="button" class="eye-btn" onclick="togglePwd()" tabindex="-1">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Error state (hidden by default) -->
      <div class="field-error" id="errorMsg" style="display:none; margin-top:-8px; margin-bottom:12px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="#dc2626"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="#fff" stroke-width="2"/></svg>
        <span id="errorText">Email ou mot de passe incorrect</span>
      </div>

      <div class="forgot">
        <a href="#">Reset password</a>
      </div>

      <button class="btn-submit" type="submit">Continue</button>

    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="signup-row">
      Don't have an account? <a href="#">Contact your institution</a>
    </div>

  </div>

  <!-- Mockup state toggles -->
  <div class="mockup-toggle">
    <button class="toggle-btn active" onclick="setState('default', this)">Default</button>
    <button class="toggle-btn" onclick="setState('error', this)">Error state</button>
    <button class="toggle-btn" onclick="setState('filled', this)">Filled</button>
  </div>

  <script>
    const STRINGS = {
      fr: {
        subPre:   'Se connecter à ',
        subPost:  ' pour continuer',
        email:    'Adresse e-mail',
        password: 'Mot de passe',
        reset:    'Mot de passe oublié ?',
        submit:   'Continuer',
        error:    'Email ou mot de passe incorrect',
        orText:   'ou',
        contact:  'Contacter votre établissement',
        noAccount:'Pas encore de compte ?',
      },
      en: {
        subPre:   'Log in to ',
        subPost:  ' to continue',
        email:    'Email address',
        password: 'Password',
        reset:    'Reset password',
        submit:   'Continue',
        error:    'Wrong email or password',
        orText:   'or',
        contact:  'Contact your institution',
        noAccount:"Don't have an account?",
      }
    };

    let currentLang = 'fr';
    let langDropOpen = false;

    function toggleLoginLang() {
      langDropOpen = !langDropOpen;
      document.getElementById('loginLangDrop').style.display = langDropOpen ? 'block' : 'none';
      document.getElementById('loginLangBtn').classList.toggle('open', langDropOpen);
    }

    document.addEventListener('click', function(e) {
      if (langDropOpen && !e.target.closest('#loginLangGlobe')) {
        langDropOpen = false;
        document.getElementById('loginLangDrop').style.display = 'none';
        document.getElementById('loginLangBtn').classList.remove('open');
      }
    });

    function setLang(l) {
      currentLang = l;
      langDropOpen = false;
      document.getElementById('loginLangDrop').style.display = 'none';
      document.getElementById('loginLangBtn').classList.remove('open');
      document.getElementById('loginLangLabel').textContent = l.toUpperCase();
      document.getElementById('optFR').classList.toggle('lact', l === 'fr');
      document.getElementById('optEN').classList.toggle('lact', l === 'en');
      const s = STRINGS[l];
      document.getElementById('brandSub').innerHTML          = s.subPre + '<strong>Exam Builder</strong>' + s.subPost;
      document.querySelector('label[for="email"]').textContent    = s.email;
      document.querySelector('label[for="password"]').textContent = s.password;
      document.querySelector('.forgot a').textContent             = s.reset;
      document.querySelector('.btn-submit').textContent           = s.submit;
      document.getElementById('errorText').textContent            = s.error;
      document.querySelector('.divider-text').textContent         = s.orText;
      document.querySelector('.signup-row').innerHTML             = s.noAccount + ' <a href="#">' + s.contact + '</a>';
    }

    setLang('fr');

    function togglePwd() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function setState(state, btn) {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const emailInput = document.getElementById('email');
      const pwdInput   = document.getElementById('password');
      const pwdField   = document.getElementById('passwordField');
      const errorMsg   = document.getElementById('errorMsg');

      if (state === 'default') {
        emailInput.value = '';
        pwdInput.value   = '';
        emailInput.classList.remove('error-input');
        pwdInput.classList.remove('error-input');
        errorMsg.style.display = 'none';
      } else if (state === 'error') {
        emailInput.value = 'dwayne.swanson@gmail.com';
        pwdInput.value   = 'wrongpassword';
        emailInput.classList.remove('error-input');
        pwdInput.classList.add('error-input');
        errorMsg.style.display = 'flex';
      } else if (state === 'filled') {
        emailInput.value = 'dwayne.swanson@gmail.com';
        pwdInput.value   = 'mypassword';
        emailInput.classList.remove('error-input');
        pwdInput.classList.remove('error-input');
        errorMsg.style.display = 'none';
      }
    }
  </script>

</body>
</html>
