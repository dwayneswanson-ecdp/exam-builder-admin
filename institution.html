<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Builder — Institution</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }

    /* ── Header ── */
    .header { background: #0f172a; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 600; background: none; border: none; cursor: pointer; font-family: inherit; transition: color 0.15s; padding: 6px 0; }
    .back-btn:hover { color: #fff; }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
    .header-logo { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.9); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-user { display: flex; align-items: center; gap: 10px; }
    .header-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .header-name { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.85); }
    .logout-btn { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.4); background: none; border: 1px solid rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .lang-toggle { display: flex; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
    .lang-btn { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.4); background: none; border: none; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .lang-btn.active { background: #2563eb; color: #fff; }

    /* ── Page ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }

    /* ── Institution hero ── */
    .inst-hero { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px 28px; display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .inst-hero-logo { width: 64px; height: 64px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8f9fc; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #94a3b8; overflow: hidden; flex-shrink: 0; }
    .inst-hero-logo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .inst-hero-info { flex: 1; }
    .inst-hero-name { font-size: 1.25rem; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; margin-bottom: 4px; }
    .inst-hero-domain { font-size: 0.82rem; color: #94a3b8; font-family: monospace; }

    /* ── Stats ── */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 32px; }
    .stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 20px; flex: 1; }
    .stat-label { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: #0f172a; }
    .stat-value.blue { color: #2563eb; }
    .stat-value.green { color: #16a34a; }
    .stat-value.purple { color: #7c3aed; }

    /* ── Section ── */
    .section { margin-bottom: 32px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #0f172a; }
    .add-btn { display: flex; align-items: center; gap: 6px; background: #0f172a; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .add-btn:hover { background: #1e293b; }

    /* ── Member list ── */
    .member-list { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .member-row { padding: 14px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px dashed #e2e8f0; }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 38px; height: 38px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .member-avatar.green { background: #16a34a; }
    .member-avatar.purple { background: #7c3aed; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 0.88rem; font-weight: 700; color: #0f172a; margin-bottom: 2px; }
    .member-email { font-size: 0.75rem; color: #94a3b8; font-family: monospace; }
    .member-meta { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .class-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .class-tag { font-size: 0.68rem; font-weight: 600; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; padding: 2px 8px; border-radius: 999px; }
    .remove-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; padding: 6px; border-radius: 6px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
    .remove-btn:hover { color: #dc2626; background: #fef2f2; }

    /* ── Exam list ── */
    .exam-row { padding: 14px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px dashed #e2e8f0; }
    .exam-row:last-child { border-bottom: none; }
    .exam-info { flex: 1; }
    .exam-title { font-size: 0.88rem; font-weight: 700; color: #0f172a; margin-bottom: 2px; }
    .exam-meta { font-size: 0.75rem; color: #94a3b8; }
    .exam-badge { font-size: 0.68rem; font-weight: 700; background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; padding: 3px 10px; border-radius: 999px; flex-shrink: 0; }

    /* ── Empty state ── */
    .empty-state { padding: 32px 24px; text-align: center; }
    .empty-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .empty-title { font-size: 0.88rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .empty-sub { font-size: 0.78rem; color: #94a3b8; }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
    .modal-close { background: none; border: none; cursor: pointer; color: #94a3b8; padding: 4px; border-radius: 6px; }
    .modal-close:hover { color: #0f172a; }
    .modal-body { padding: 0 28px 28px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 0.78rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
    .modal-field input { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.88rem; font-family: inherit; color: #0f172a; outline: none; transition: border-color 0.15s; }
    .modal-field input:focus { border-color: #2563eb; }
    .modal-row { display: flex; gap: 12px; }
    .modal-row .modal-field { flex: 1; }
    .modal-section-label { font-size: 0.68rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
    .modal-submit { width: 100%; background: #0f172a; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
    .modal-submit:hover { background: #1e293b; }
    .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-error { font-size: 0.8rem; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; margin-top: 10px; display: none; }
    .modal-success { font-size: 0.8rem; color: #16a34a; background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 8px 12px; margin-top: 10px; display: none; }

    /* ── Classes input ── */
    .class-input-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .class-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; font-family: inherit; color: #0f172a; outline: none; transition: border-color 0.15s; }
    .class-input-row input:focus { border-color: #2563eb; }
    .class-remove-btn { background: none; border: 1.5px solid #e2e8f0; color: #94a3b8; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .class-remove-btn:hover { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }
    .add-class-btn { display: flex; align-items: center; gap: 6px; background: #f8f9fc; border: 1.5px dashed #e2e8f0; color: #475569; padding: 7px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; justify-content: center; transition: all 0.15s; margin-top: 4px; }
    .add-class-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

    /* ── Remove confirm modal ── */
    .remove-warning { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; font-size: 0.85rem; color: #7f1d1d; line-height: 1.6; }
    .remove-cancel-btn { width: 100%; background: #f1f5f9; color: #0f172a; border: 1.5px solid #e2e8f0; padding: 11px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 8px; transition: background 0.15s; }
    .remove-cancel-btn:hover { background: #e2e8f0; }
    .remove-confirm-btn { width: 100%; background: #dc2626; color: #fff; border: none; padding: 11px; border-radius: 8px; font-size: 0.88rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    .remove-confirm-btn:hover { background: #b91c1c; }

    /* ── Key contact ── */
    .key-contact-badge { font-size: 0.65rem; font-weight: 700; background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }
    .key-contact-toggle { display: flex; align-items: center; gap: 10px; background: #f8f9fc; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; cursor: pointer; transition: border-color 0.15s; }
    .key-contact-toggle:hover { border-color: #2563eb; }
    .key-contact-toggle input[type="checkbox"] { width: 16px; height: 16px; accent-color: #2563eb; cursor: pointer; flex-shrink: 0; }
    .key-contact-toggle-label { font-size: 0.82rem; font-weight: 600; color: #475569; }
    .key-contact-toggle-sub { font-size: 0.72rem; color: #94a3b8; margin-top: 1px; }

    /* ── Skeleton ── */
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="backBtnText">All Institutions</span>
      </button>
      <div class="header-divider"></div>
      <span class="header-logo">Exam Builder</span>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnFR" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
      </div>
      <div class="header-user">
        <div class="header-avatar" id="headerAvatar">—</div>
        <div class="header-name" id="headerName">—</div>
      </div>
      <button class="logout-btn" id="logoutBtn" onclick="signOut()">Sign out</button>

    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Admins</div><div class="stat-value blue" id="statAdmins">—</div></div>

      <div class="stat-card"><div class="stat-label">Classes</div><div class="stat-value purple" id="statClasses">—</div></div>

          Add Admin

      </div>
      <div class="member-list" id="adminList">
        <div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">No admins yet</div></div>
      </div>
    </div>

    <!-- Teachers section -->

      <div class="section-header">
        <div class="section-title">Teachers</div>
        <button class="add-btn" onclick="openAddModal('teacher')">

          Add Teacher

      </div>

  </div>

  <!-- ── Add Admin / Teacher Modal ── -->
  <div class="modal-backdrop" id="addModal" style="display:none;" onclick="handleAddBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="addModalTitle">Add Member</div>
        <button class="modal-close" onclick="closeAddModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        </div>
        <div class="modal-field"><label>Email</label><input type="email" id="mEmail" placeholder="marie@institution.fr"></div>

        <!-- Admin only: job title -->
        <div id="adminFields">
          <div class="modal-field"><label>Job title</label><input type="text" id="mJobTitle" placeholder="Head of Academic Affairs"></div>
        </div>

        <!-- Key contact toggle (admins only) -->
        <div id="keyContactSection">
          <label class="key-contact-toggle" onclick="toggleKeyContact()">
            <input type="checkbox" id="mIsKeyContact" onchange="toggleKeyContact()">
            <div>
              <div class="key-contact-toggle-label" id="keyContactLabel">Set as key contact</div>
              <div class="key-contact-toggle-sub" id="keyContactSub">Designates this person as the primary contact for this institution</div>
            </div>

          <div id="phoneField" style="display:none;">
            <div class="modal-field"><label id="phoneLabel">Phone number</label><input type="tel" id="mPhone" placeholder="+33 6 00 00 00 00"></div>
          </div>
        </div>

        <!-- Teacher only: classes -->

          <div class="modal-section-label">Classes</div>
          <div id="classInputsContainer"></div>

            Add class

        </div>

        <button class="modal-submit" id="addSubmitBtn" onclick="submitMember()">Add Member</button>
        <div class="modal-error" id="addError"></div>
        <div class="modal-success" id="addSuccess"></div>
      </div>
    </div>
  </div>

        <button class="modal-close" onclick="closeRemoveModal()">

        </button>
      </div>
      <div class="modal-body">
        <div class="remove-warning" id="removeWarningText"></div>

        <button class="remove-confirm-btn" id="removeConfirmBtn" onclick="confirmRemove()">Remove</button>

        emptyExams:       'No exams published yet',
        modalAddAdmin:    'Add Admin',
        modalAddTeacher:  'Add Teacher',
        firstName:        'First name',
        lastName:         'Last name',
        email:            'Email',
        jobTitle:         'Job title',
        keyContactLabel:  'Set as key contact',
        keyContactSub:    'Designates this person as the primary contact for this institution',
        phone:            'Phone number',
        classes:          'Classes',
        addClass:         '+ Add class',
        submitAdmin:      'Add Admin',
        submitTeacher:    'Add Teacher',
        removeTitle:      'Remove Member',
        removeCancel:     'Cancel',
        removeConfirm:    'Remove',
        keyContact:       'Key Contact',
        published:        'Published',
        firstNamePH:      'Marie',
        lastNamePH:       'Dupont',
        emailPH:          'marie@institution.fr',
        phonePH:          '+33 6 00 00 00 00',
        jobTitlePH:       'Head of Academic Affairs',
        classNamePH:      'Class name',
      }
    };

    function setLang(l) {
      lang = l;
      localStorage.setItem('dashLang', l);
      document.getElementById('btnFR').classList.toggle('active', l === 'fr');
      document.getElementById('btnEN').classList.toggle('active', l === 'en');
      applyI18n();
    }

    function applyI18n() {
      const t = i18n[lang];
      document.getElementById('backBtnText').textContent    = t.backBtn;
      document.getElementById('logoutBtn').textContent      = t.logout;
    }

    function t(key) { return i18n[lang][key] || key; }

    // ── Auth ─────────────────────────────────────────────────────

    async function init() {
      if (!instId) { window.location.href = 'dashboard.html'; return; }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'dashboard.html'; return; }

      currentUser = session.user;
      const { data: teacher } = await sb.from('teachers').select('*').eq('id', session.user.id).single();
      if (!teacher) { window.location.href = 'dashboard.html'; return; }

      const initials = (teacher.full_name || '').split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
      document.getElementById('headerAvatar').textContent = initials;
      document.getElementById('headerName').textContent   = teacher.full_name || teacher.email;

      document.getElementById('btnFR').classList.toggle('active', lang === 'fr');
      document.getElementById('btnEN').classList.toggle('active', lang === 'en');
      applyI18n();
      document.getElementById('pageContent').style.display = 'block';
      await loadPage();
    }

    async function signOut() {
      await sb.auth.signOut();
      window.location.href = 'dashboard.html';
    }

    // ── Load page data ────────────────────────────────────────────

    async function loadPage() {
      const [instRes, adminLinksRes, teacherLinksRes] = await Promise.all([
        sb.from('institutions').select('*').eq('id', instId).single(),
        sb.from('institution_admins').select('teacher_id, is_key_contact').eq('institution_id', instId),
        sb.from('institution_teachers').select('teacher_id, is_key_contact').eq('institution_id', instId)
      ]);

      const inst           = instRes.data;
      const adminLinks     = adminLinksRes.data  || [];
      const teacherLinks   = teacherLinksRes.data || [];

      if (!inst) { window.location.href = 'dashboard.html'; return; }

      // Institution hero
      document.title = `${inst.name} — Exam Builder`;
      document.getElementById('instName').textContent   = inst.name;
      document.getElementById('instDomain').textContent = inst.domain || '—';
      const logoEl = document.getElementById('instLogo');
      if (inst.logo_url) {
        logoEl.innerHTML = `<img src="${inst.logo_url}" alt="${inst.name}">`;
      } else {
        logoEl.textContent = inst.name.substring(0,4).toUpperCase();
      }

      // Fetch teacher details for admins and teachers
      const allIds = [...new Set([...adminLinks.map(a => a.teacher_id), ...teacherLinks.map(t => t.teacher_id)])];

      let teachers = [];
      if (allIds.length > 0) {
        const { data } = await sb.from('teachers').select('*').in('id', allIds);
        teachers = data || [];
      }

      // Fetch classes for teachers
      const teacherIds = teacherLinks.map(t => t.teacher_id);
      let classes = [];
      if (teacherIds.length > 0) {
        const { data } = await sb.from('classes').select('*').in('teacher_id', teacherIds);
        classes = data || [];
      }

      // Fetch exams
      const { data: exams } = teacherIds.length > 0
        ? await sb.from('exams').select('*').in('teacher_id', teacherIds).order('created_at', { ascending: false })
        : { data: [] };

      // Stats
      const totalClasses = classes.length;
      document.getElementById('statAdmins').textContent   = adminLinks.length;
      document.getElementById('statTeachers').textContent = teacherLinks.length;
      document.getElementById('statClasses').textContent  = totalClasses;
      document.getElementById('statExams').textContent    = (exams || []).length;

      // Render admins
      renderAdmins(adminLinks, teachers);

      // Render teachers
      renderTeachers(teacherLinks, teachers, classes);

      // Render exams
      renderExams(exams || [], teachers);
    }

    function renderAdmins(links, teachers) {
      const el = document.getElementById('adminList');
      if (links.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">No admins yet</div></div>`;
        return;
      }
      el.innerHTML = links.map(link => {
        const t = teachers.find(t => t.id === link.teacher_id);
        if (!t) return '';
        const initials = (t.full_name || t.email).split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
        return `
          <div class="member-row">
            <div class="member-avatar">${initials}</div>
            <div class="member-info">
              <div class="member-name">${t.full_name || '—'}${link.is_key_contact ? '<span class="key-contact-badge">Key Contact</span>' : ''}</div>
              <div class="member-email">${t.email}</div>
              ${t.job_title ? `<div class="member-meta">${t.job_title}</div>` : ''}
              ${link.is_key_contact && t.phone ? `<div class="member-meta">📞 ${t.phone}</div>` : ''}
            </div>
            <button class="remove-btn" onclick="openRemoveModal('${t.id}', 'admin', '${(t.full_name || t.email).replace(/'/g,"\\'")}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>`;
      }).join('');
    }

    function renderTeachers(links, teachers, classes) {
      const el = document.getElementById('teacherList');
      if (links.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎓</div><div class="empty-title">No teachers yet</div></div>`;
        return;
      }
      el.innerHTML = links.map(link => {
        const t = teachers.find(t => t.id === link.teacher_id);
        if (!t) return '';
        const initials  = (t.full_name || t.email).split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
        const tClasses  = classes.filter(c => c.teacher_id === t.id);
        const classHtml = tClasses.length > 0
          ? `<div class="class-tags">${tClasses.map(c => `<span class="class-tag">${c.name}</span>`).join('')}</div>`
          : '';
        return `
          <div class="member-row">
            <div class="member-avatar green">${initials}</div>
            <div class="member-info">
              <div class="member-name">${t.full_name || '—'}${link.is_key_contact ? '<span class="key-contact-badge">Key Contact</span>' : ''}</div>
              <div class="member-email">${t.email}</div>
              ${link.is_key_contact && t.phone ? `<div class="member-meta">📞 ${t.phone}</div>` : ''}
              ${classHtml}
            </div>
            <button class="remove-btn" onclick="openRemoveModal('${t.id}', 'teacher', '${(t.full_name || t.email).replace(/'/g,"\\'")}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>`;
      }).join('');
    }

    function renderExams(exams, teachers) {
      const el = document.getElementById('examList');
      if (exams.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">No exams published yet</div></div>`;
        return;
      }
      el.innerHTML = exams.map(exam => {
        const t    = teachers.find(t => t.id === exam.teacher_id);
        const date = new Date(exam.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        return `
          <div class="exam-row">
            <div class="exam-info">
              <div class="exam-title">${exam.title || 'Untitled exam'}</div>
              <div class="exam-meta">${t ? t.full_name : '—'} · ${date} · ${exam.duration_mins} min</div>
            </div>
            <div class="exam-badge">Published</div>
          </div>`;
      }).join('');
    }

    // ── Add modal ─────────────────────────────────────────────────

    function openAddModal(role) {
      addModalRole = role;
      classInputs  = [''];
      document.getElementById('addModalTitle').textContent   = role === 'admin' ? t('modalAddAdmin') : t('modalAddTeacher');
      document.getElementById('addSubmitBtn').textContent    = role === 'admin' ? t('submitAdmin')   : t('submitTeacher');
      document.getElementById('adminFields').style.display   = role === 'admin'   ? 'block' : 'none';
      document.getElementById('teacherFields').style.display = role === 'teacher' ? 'block' : 'none';
      // Key contact only applies to admins
      document.getElementById('keyContactSection').style.display = role === 'admin' ? 'block' : 'none';
      ['mFirst','mLast','mEmail','mPhone','mJobTitle'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('mIsKeyContact').checked    = false;
      document.getElementById('phoneField').style.display = 'none';
      document.getElementById('addError').style.display   = 'none';
      document.getElementById('addSuccess').style.display = 'none';
      document.getElementById('addSubmitBtn').disabled    = false;
      if (role === 'teacher') renderClassInputs();
      document.getElementById('addModal').style.display = 'flex';
    }

    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
    function handleAddBackdrop(e) { if (e.target === document.getElementById('addModal')) closeAddModal(); }

    function toggleKeyContact() {
      const checked = document.getElementById('mIsKeyContact').checked;
      document.getElementById('phoneField').style.display = checked ? 'block' : 'none';
    }

    function renderClassInputs() {
      const container = document.getElementById('classInputsContainer');
      container.innerHTML = classInputs.map((val, i) => `
        <div class="class-input-row">
          <input type="text" placeholder="Class name" value="${val}"
            oninput="classInputs[${i}] = this.value"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addClassInput();}">
          ${classInputs.length > 1
            ? `<button type="button" class="class-remove-btn" onclick="removeClassInput(${i})">×</button>`
            : ''}
        </div>`).join('');
    }

    function addClassInput() {
      classInputs.push('');
      renderClassInputs();
      const inputs = document.querySelectorAll('#classInputsContainer input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function removeClassInput(i) {
      classInputs.splice(i, 1);
      renderClassInputs();
    }

    async function submitMember() {
      const firstName = document.getElementById('mFirst').value.trim();
      const lastName  = document.getElementById('mLast').value.trim();
      const email     = document.getElementById('mEmail').value.trim();
      const phone        = document.getElementById('mPhone').value.trim();
      const jobTitle     = document.getElementById('mJobTitle').value.trim();
      const isKeyContact = document.getElementById('mIsKeyContact').checked;
      const errEl     = document.getElementById('addError');
      const succEl    = document.getElementById('addSuccess');
      const btn       = document.getElementById('addSubmitBtn');

      errEl.style.display = succEl.style.display = 'none';
      if (!firstName || !lastName || !email) {
        errEl.textContent = 'First name, last name and email are required.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Adding…';

      const { data: { session } } = await sb.auth.getSession();

      try {
        const res = await fetch(ADD_MEMBER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({
            institution_id: instId,
            role:           addModalRole,
            email,
            full_name:      `${firstName} ${lastName}`,
            phone:           isKeyContact ? (phone || null) : null,
            job_title:       jobTitle || null,
            is_key_contact:  isKeyContact,
            classes:         addModalRole === 'teacher' ? classInputs.filter(c => c.trim()) : []
          })
        });

        const result = await res.json();
        if (!res.ok || result.error) throw new Error(result.error || 'Unknown error');

        succEl.innerHTML     = `✅ <strong>${firstName} ${lastName}</strong> added.<br>
          ${result.temp_password ? `Temporary password: <code>${result.temp_password}</code>` : 'Account linked.'}`;
        succEl.style.display = 'block';
        btn.textContent      = '✅ Done';

        await loadPage();
        setTimeout(closeAddModal, 3000);

      } catch (err) {
        errEl.textContent   = 'Error: ' + err.message;
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = addModalRole === 'admin' ? 'Add Admin' : 'Add Teacher';
      }
    }

    // ── Remove modal ──────────────────────────────────────────────

    function openRemoveModal(teacherId, role, name) {
      removeTargetId   = teacherId;
      removeTargetRole = role;
      document.getElementById('removeWarningText').innerHTML =
        `This will remove <strong>${name}</strong> from this institution.<br>
         Their account will not be deleted — they will simply lose access to this institution.`;
      document.getElementById('removeModal').style.display = 'flex';
    }

    function closeRemoveModal() { document.getElementById('removeModal').style.display = 'none'; }
    function handleRemoveBackdrop(e) { if (e.target === document.getElementById('removeModal')) closeRemoveModal(); }

    async function confirmRemove() {
      const btn   = document.getElementById('removeConfirmBtn');
      btn.disabled    = true;
      btn.textContent = 'Removing…';

      const table = removeTargetRole === 'admin' ? 'institution_admins' : 'institution_teachers';
      const { error } = await sb.from(table).delete()
        .eq('institution_id', instId)
        .eq('teacher_id', removeTargetId);

      if (error) {
        alert('Remove failed: ' + error.message);
        btn.disabled    = false;
        btn.textContent = 'Remove';
        return;
      }

      closeRemoveModal();
      await loadPage();
    }

    init();
  </script>
</body>
</html>
