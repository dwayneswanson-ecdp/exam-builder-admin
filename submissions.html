<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Submissions — Exam Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }

    .header { background: #0f172a; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 600; background: none; border: none; cursor: pointer; font-family: inherit; padding: 6px 0; transition: color 0.15s; }
    .back-btn:hover { color: #fff; }
    .header-logo { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.9); }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
    .header-badge { font-size: 0.62rem; font-weight: 700; background: #16a34a; color: #fff; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase; }
    .header-name { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.7); }

    .page { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    /* Exam hero */
    .exam-hero { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
    .exam-hero-left { flex: 1; min-width: 0; }
    .exam-title { font-size: 1.3rem; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; margin-bottom: 4px; }
    .exam-meta { font-size: 0.82rem; color: #94a3b8; }
    .hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }
    .stats-row { display: flex; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    .stat-pill { background: #f8fafc; padding: 14px 24px; text-align: center; border-right: 1px solid #e2e8f0; }
    .stat-pill:last-child { border-right: none; }
    .stat-pill-val { font-size: 1.4rem; font-weight: 800; color: #0f172a; }
    .stat-pill-val.orange { color: #ea580c; }
    .stat-pill-val.green  { color: #16a34a; }
    .stat-pill-val.red    { color: #dc2626; }
    .stat-pill-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-top: 3px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 700; font-family: inherit; border: none; border-radius: 7px; padding: 9px 16px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-primary   { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline   { background: #fff; color: #475569; border: 1.5px solid #e2e8f0; }
    .btn-outline:hover { border-color: #94a3b8; color: #0f172a; }
    .btn-ghost-sm  { display: inline-flex; align-items: center; gap: 5px; background: none; color: #64748b; border: 1px solid #e2e8f0; font-size: 0.75rem; font-weight: 600; font-family: inherit; padding: 6px 12px; border-radius: 7px; cursor: pointer; }
    .btn-ghost-sm:hover { border-color: #94a3b8; color: #0f172a; }
    .btn-scheduled { background: #16a34a; color: #fff; border: none; }
    .btn-scheduled:hover { background: #15803d; }
    .pencil-btn { background: none; border: none; cursor: pointer; padding: 2px; display: inline-flex; align-items: center; color: #16a34a; transition: color 0.15s; }
    .pencil-btn:hover { color: #15803d; }

    /* Send panel */
    .send-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .send-panel-head { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
    .send-panel-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; }
    .send-format-hint { font-size: 0.75rem; color: #94a3b8; }
    .send-format-hint a { color: #2563eb; cursor: pointer; }
    .send-panel-body { padding: 16px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .schedule-picker { display: flex; align-items: center; gap: 8px; padding-left: 12px; border-left: 1.5px solid #e2e8f0; }
    .ctrl-select, .ctrl-date {
      font-size: 0.82rem; font-family: inherit;
      border: 1.5px solid #e2e8f0; border-radius: 7px;
      padding: 0 10px; height: 36px; color: #0f172a; outline: none;
      background: #fff; cursor: pointer;
    }
    .ctrl-select:focus, .ctrl-date:focus { border-color: #2563eb; }
    .schedule-confirm { display: none; align-items: center; gap: 8px; font-size: 0.82rem; color: #166534; font-weight: 600; padding-left: 12px; border-left: 1.5px solid #e2e8f0; }

    /* Student list panel */
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .panel-header { display: grid; grid-template-columns: 36px 1fr 110px 120px 80px; align-items: center; gap: 12px; padding: 10px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .col-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
    .select-all-label { grid-column: 1 / 3; display: flex; align-items: center; gap: 8px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; cursor: pointer; }
    .sub-row { display: grid; grid-template-columns: 36px 1fr 110px 120px 80px; align-items: center; gap: 12px; padding: 13px 20px; border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
    .sub-row:last-child { border-bottom: none; }
    .sub-row:not(.row-sent):hover { background: #fafafa; }
    .sub-row input[type="checkbox"],
    .panel-header input[type="checkbox"] { accent-color: #2563eb; width: 15px; height: 15px; cursor: pointer; }
    .row-sent { opacity: 0.55; }
    .row-bounced { background: #fff8f8; }
    .sub-name { font-size: 0.88rem; font-weight: 700; color: #2563eb; cursor: pointer; }
    .sub-name:hover { text-decoration: underline; }
    .sub-email { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; }
    .sub-email-bounced { color: #fca5a5; }
    .bounce-hint { font-size: 0.68rem; color: #991b1b; font-weight: 600; margin-left: 4px; }
    .sub-score { font-size: 0.88rem; font-weight: 800; color: #0f172a; text-align: right; }
    .sub-date { font-size: 0.73rem; color: #94a3b8; }
    .badge { font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; display: inline-block; }
    .badge-pending  { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
    .badge-sent     { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .badge-sched    { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-bounced  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .empty-state { padding: 48px 20px; text-align: center; color: #94a3b8; font-size: 0.88rem; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; font-size: 0.82rem; font-weight: 600; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; }
    .lang-pill { display:flex; border:1.5px solid rgba(255,255,255,0.15); border-radius:999px; overflow:hidden; }
    .lang-pill button { padding:4px 10px; background:transparent; border:none; color:rgba(255,255,255,0.4); font-size:0.72rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .lang-pill button.active { background:rgba(255,255,255,0.15); color:#fff; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="backBtn">My Exams</span>
      </button>
      <div class="header-divider"></div>
      <span class="header-logo">Exam Builder</span>
      <div class="header-divider"></div>
      <span class="header-badge" data-i18n="badge">Teacher</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div id="langToggleMount"></div>
      <span class="header-name" id="headerName"></span>
    </div>
  </header>

  <div class="page" id="pageContent" style="display:none;">

    <!-- Exam hero -->
    <div class="exam-hero">
      <div class="exam-hero-left">
        <div class="exam-title" id="examTitle">—</div>
        <div class="exam-meta" id="examMeta">—</div>
      </div>
      <div class="hero-right">
        <div class="stats-row">
          <div class="stat-pill"><div class="stat-pill-val" id="statTotal">—</div><div class="stat-pill-label">Submissions</div></div>
          <div class="stat-pill"><div class="stat-pill-val orange" id="statPending">—</div><div class="stat-pill-label" data-i18n="statPending">Pending</div></div>
          <div class="stat-pill"><div class="stat-pill-val green" id="statSent">—</div><div class="stat-pill-label" data-i18n="statSent">Sent</div></div>
          <div class="stat-pill"><div class="stat-pill-val red" id="statBounced">—</div><div class="stat-pill-label" data-i18n="statBounced">Bounced</div></div>
        </div>
        <button class="btn-ghost-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF report
        </button>
      </div>
    </div>

    <!-- Send panel -->
    <div class="send-panel">
      <div class="send-panel-head">
        <span class="send-panel-title">Send Results</span>
        <span class="send-format-hint">Sending: Full results · <a>Change</a></span>
      </div>
      <div class="send-panel-body">
        <button class="btn btn-primary" id="sendNowBtn" onclick="sendSelected()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send now
        </button>
        <button class="btn btn-outline" id="scheduleToggle" onclick="toggleSchedule()">Schedule send</button>

        <div class="schedule-picker" id="schedulePicker" style="display:none;">
          <input type="date" class="ctrl-date" id="schedDate">
          <select class="ctrl-select" id="schedTime">
            <option>6:00 AM</option><option>6:30 AM</option><option>7:00 AM</option><option>7:30 AM</option>
            <option>8:00 AM</option><option>8:30 AM</option><option selected>9:00 AM</option><option>9:30 AM</option>
            <option>10:00 AM</option><option>10:30 AM</option><option>11:00 AM</option><option>11:30 AM</option>
            <option>12:00 PM</option><option>12:30 PM</option><option>1:00 PM</option><option>1:30 PM</option>
            <option>2:00 PM</option><option>2:30 PM</option><option>3:00 PM</option><option>3:30 PM</option>
            <option>4:00 PM</option><option>4:30 PM</option><option>5:00 PM</option><option>5:30 PM</option>
            <option>6:00 PM</option><option>7:00 PM</option><option>8:00 PM</option><option>9:00 PM</option>
          </select>
          <button class="btn btn-outline" onclick="confirmSchedule()">Confirm</button>
        </div>

        <div class="schedule-confirm" id="scheduleConfirm">
          <span id="scheduleLabel"></span>
          <button class="pencil-btn" onclick="editSchedule()" title="Edit schedule">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Student list -->
    <div class="panel">
      <div class="panel-header">
        <label class="select-all-label">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)">
          Select All
        </label>
        <div class="col-label">Status</div>
        <div class="col-label">Submitted</div>
        <div class="col-label" style="text-align:right;">Score</div>
      </div>
      <div id="subList"><div class="empty-state">Loading submissions…</div></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="lang.js"></script>
  <script>
    document.addEventListener('langchange', function() { window.location.reload(); });

    const i18n = {
      fr: {
        backBtn:'Mes examens', badge:'Enseignant',
        statPending:'En attente', statSent:'Envoyé', statBounced:'Refusé',
        badgeSent:'Envoyé', badgePending:'En attente', badgeBounced:'Refusé', badgeScheduled:'Planifié',
      },
      en: {
        backBtn:'My Exams', badge:'Teacher',
        statPending:'Pending', statSent:'Sent', statBounced:'Bounced',
        badgeSent:'Sent', badgePending:'Pending', badgeBounced:'Bounced', badgeScheduled:'Scheduled',
      }
    };

    const SUPABASE_URL = 'https://toxgihdyfzdymgidgvaq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRveGdpaGR5ZnpkeW1naWRndmFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODQ0OTYsImV4cCI6MjA5MjI2MDQ5Nn0.FOA3ZA8Eh-g231al2DS4NjGfLjIkpRlmb7_fKXz65Xo';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const EMAILJS_SERVICE  = 'service_opm4h6b';
    const EMAILJS_TEMPLATE = 'template_x7bkb1l';
    const EMAILJS_KEY      = 'Bb0oPYBiZGQcyIz5r';

    const examId = new URLSearchParams(window.location.search).get('exam');
    let attempts = [];
    let currentTeacher   = null;
    let currentExam      = null;
    let currentInstitution = null;
    let mcqTotal         = 0;
    let scheduledState   = false;

    async function init() {
      if (!examId) { window.location.href = 'dashboard.html'; return; }
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'dashboard.html'; return; }
      await sb.auth.setSession({ access_token: session.access_token, refresh_token: session.refresh_token });

      const { data: teacher } = await sb.from('teachers').select('*').eq('id', session.user.id).single();
      if (!teacher) { window.location.href = 'dashboard.html'; return; }
      currentTeacher = teacher;
      document.getElementById('headerName').textContent = teacher.full_name || teacher.email;
      Lang.init(i18n);

      try { emailjs.init({ publicKey: EMAILJS_KEY }); } catch(e) {}

      document.getElementById('pageContent').style.display = 'block';
      await loadPage();
    }

    async function loadPage() {
      const [examRes, attemptsRes, questionsRes, institutionTeacherRes] = await Promise.all([
        sb.from('exams').select('*').eq('id', examId).single(),
        sb.from('exam_attempts').select('*').eq('exam_id', examId),
        sb.from('questions').select('id').eq('exam_id', examId).neq('type', 'open'),
        sb.from('institution_teachers').select('institution_id').eq('teacher_id', currentTeacher.id).single()
      ]);

      const exam = examRes.data;
      if (!exam) { window.location.href = 'dashboard.html'; return; }
      currentExam = exam;
      attempts    = attemptsRes.data || [];
      mcqTotal    = (questionsRes.data || []).length;

      // Fetch institution for email branding
      if (institutionTeacherRes.data?.institution_id) {
        const { data: inst } = await sb.from('institutions')
          .select('name, logo_url')
          .eq('id', institutionTeacherRes.data.institution_id)
          .single();
        currentInstitution = inst;
      }

      // Sort alphabetically by student_name
      attempts.sort((a, b) => (a.student_name || '').localeCompare(b.student_name || ''));

      document.title = `${exam.title} — Exam Builder`;
      document.getElementById('examTitle').textContent = exam.title;
      const date = exam.created_at
        ? new Date(exam.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '—';
      document.getElementById('examMeta').textContent = `${exam.duration_mins} min · Published ${date}`;

      updateStats();
      renderList();
    }

    function updateStats() {
      const sent    = attempts.filter(a => a.results_sent_at).length;
      const bounced = attempts.filter(a => a.bounce_at).length;
      const pending = attempts.length - sent - bounced;
      document.getElementById('statTotal').textContent   = attempts.length;
      document.getElementById('statPending').textContent = Math.max(0, pending);
      document.getElementById('statSent').textContent    = sent;
      document.getElementById('statBounced').textContent = bounced;
    }

    function formatName(raw) {
      if (!raw) return '—';
      const parts = raw.trim().split(/\s+/);
      if (parts.length < 2) return raw.toUpperCase();
      const last  = parts[parts.length - 1].toUpperCase();
      const first = parts.slice(0, -1).join(' ');
      return `${last} ${first}`;
    }

    function renderList() {
      const el = document.getElementById('subList');
      if (attempts.length === 0) {
        el.innerHTML = '<div class="empty-state">No submissions yet for this exam.</div>';
        return;
      }
      el.innerHTML = attempts.map((a, i) => {
        const date = a.submitted_at
          ? new Date(a.submitted_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' · ' +
            new Date(a.submitted_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '—';
        const scoreText = (a.score_mcq !== null && a.score_mcq !== undefined) ? `${a.score_mcq} / 20` : '— / 20';

        let badge = '';
        let rowClass = 'sub-row';
        let emailEl = `<div class="sub-email">${a.student_email || ''}</div>`;
        let cbAttrs = `class="sub-check" data-idx="${i}" onchange="updateSelectAll()">`;

        if (a.bounce_at) {
          badge = `<span class="badge badge-bounced">${Lang.t('badgeBounced')}</span>`;
          rowClass += ' row-bounced';
          emailEl = `<div class="sub-email sub-email-bounced">${a.student_email || ''}
            <span class="bounce-hint">· incorrect email — update &amp; resend</span></div>`;
        } else if (a.results_sent_at) {
          badge = `<span class="badge badge-sent">${Lang.t('badgeSent')}</span>`;
          rowClass += ' row-sent';
          cbAttrs = `class="sub-check" data-idx="${i}" disabled onchange="updateSelectAll()">`;
        } else if (a.scheduled_send_at) {
          const sd = new Date(a.scheduled_send_at);
          const schedLabel = sd.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' +
            sd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          badge = `<span class="badge badge-sched">Sched. ${schedLabel}</span>`;
        } else {
          badge = `<span class="badge badge-pending">${Lang.t('badgePending')}</span>`;
        }

        return `
          <div class="${rowClass}" data-id="${a.id}">
            <input type="checkbox" ${cbAttrs}
            <div>
              <div class="sub-name" onclick="openReview('${a.id}')">${formatName(a.student_name)}</div>
              ${emailEl}
            </div>
            <div>${badge}</div>
            <div class="sub-date">${date}</div>
            <div class="sub-score">${scoreText}</div>
          </div>`;
      }).join('');
    }

    function openReview(attemptId) {
      window.location.href = `student-review.html?attempt=${attemptId}&exam=${examId}`;
    }

    function toggleSelectAll(checked) {
      document.querySelectorAll('.sub-check:not([disabled])').forEach(cb => cb.checked = checked);
    }

    function updateSelectAll() {
      const all      = document.querySelectorAll('.sub-check:not([disabled])');
      const checked  = document.querySelectorAll('.sub-check:not([disabled]):checked');
      const selAll   = document.getElementById('selectAll');
      selAll.checked = all.length > 0 && checked.length === all.length;
      selAll.indeterminate = checked.length > 0 && checked.length < all.length;
    }

    function getSelectedAttempts() {
      return [...document.querySelectorAll('.sub-check:checked')]
        .map(cb => attempts[parseInt(cb.dataset.idx)]);
    }

    // Schedule panel
    function toggleSchedule() {
      const picker  = document.getElementById('schedulePicker');
      const toggle  = document.getElementById('scheduleToggle');
      const confirm = document.getElementById('scheduleConfirm');
      const showing = picker.style.display === 'flex';
      if (showing) {
        picker.style.display = 'none';
        if (scheduledState) {
          toggle.className = 'btn btn-scheduled';
          toggle.textContent = '✓ Scheduled';
          confirm.style.display = 'flex';
        } else {
          toggle.className = 'btn btn-outline';
          toggle.textContent = 'Schedule send';
        }
      } else {
        picker.style.display = 'flex';
        confirm.style.display = 'none';
        toggle.className = 'btn btn-outline';
        toggle.textContent = 'Cancel';
      }
    }

    async function confirmSchedule() {
      const selected = getSelectedAttempts().filter(a => !a.results_sent_at);
      if (selected.length === 0) { showToast('Select at least one pending submission.'); return; }
      const dateVal = document.getElementById('schedDate').value;
      if (!dateVal) { showToast('Please pick a date.'); return; }
      const timeStr = document.getElementById('schedTime').value;

      // Parse "9:00 AM" style time
      const [timePart, meridiem] = timeStr.split(' ');
      let [hours, mins] = timePart.split(':').map(Number);
      if (meridiem === 'PM' && hours !== 12) hours += 12;
      if (meridiem === 'AM' && hours === 12) hours = 0;
      const scheduledAt = new Date(`${dateVal}T${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:00`).toISOString();

      const ids = selected.map(a => a.id);
      const { error } = await sb.from('exam_attempts').update({ scheduled_send_at: scheduledAt }).in('id', ids);
      if (error) { showToast('Error: ' + error.message); return; }
      selected.forEach(a => { a.scheduled_send_at = scheduledAt; });

      const d = new Date(scheduledAt);
      const label = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      scheduledState = true;
      document.getElementById('schedulePicker').style.display = 'none';
      document.getElementById('scheduleToggle').className = 'btn btn-scheduled';
      document.getElementById('scheduleToggle').textContent = '✓ Scheduled';
      document.getElementById('scheduleLabel').textContent = `Exam delivery scheduled for ${label} · ${timeStr}`;
      document.getElementById('scheduleConfirm').style.display = 'flex';

      renderList();
      showToast(`${ids.length} result${ids.length > 1 ? 's' : ''} scheduled.`);
    }

    function editSchedule() {
      document.getElementById('scheduleConfirm').style.display = 'none';
      document.getElementById('schedulePicker').style.display = 'flex';
      document.getElementById('scheduleToggle').className = 'btn btn-outline';
      document.getElementById('scheduleToggle').textContent = 'Cancel';
    }

    async function sendSelected() {
      const btn = document.getElementById('sendNowBtn');
      const selected = getSelectedAttempts().filter(a => !a.results_sent_at && !a.bounce_at);
      if (selected.length === 0) { showToast('Select at least one pending submission.'); return; }
      btn.disabled = true;
      btn.textContent = 'Sending…';

      let sent = 0;
      let failed = 0;

      for (const a of selected) {
        const scoreObtained  = a.score_mcq ?? 0;
        const scoreConverted = mcqTotal > 0
          ? ((scoreObtained / mcqTotal) * 20).toFixed(1)
          : scoreObtained;
        const dateTaken = a.submitted_at
          ? new Date(a.submitted_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
          : '—';

        const params = {
          to_email:           a.student_email || '',
          to_name:            a.student_name  || '',
          student_name:       a.student_name  || '',
          exam_title:         currentExam.title,
          class_name:         currentExam.groups || '—',
          teacher_name:       currentTeacher.full_name || currentTeacher.email,
          date_taken:         dateTaken,
          score_obtained:     scoreObtained,
          score_total:        mcqTotal,
          score_converted:    scoreConverted,
          score_coefficient:  20,
          institution_name:   currentInstitution?.name  || '',
          institution_logo_url: currentInstitution?.logo_url || ''
        };

        try {
          await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params);
          const now = new Date().toISOString();
          const { error } = await sb.from('exam_attempts').update({ results_sent_at: now }).eq('id', a.id);
          if (!error) { a.results_sent_at = now; sent++; }
        } catch (e) {
          console.error('EmailJS error for', a.student_email, e);
          failed++;
        }
      }

      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send now`;
      updateStats();
      renderList();

      if (failed > 0 && sent > 0) {
        showToast(`${sent} sent, ${failed} failed — check student emails.`);
      } else if (failed > 0) {
        showToast(`Failed to send ${failed} email${failed > 1 ? 's' : ''} — check student emails.`);
      } else {
        showToast(`${sent} result${sent > 1 ? 's' : ''} sent.`);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
  </script>
</body>
</html>
